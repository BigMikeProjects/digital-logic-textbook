<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" width="940" height="560">

  <style>
    svg { background: #ffffff; }
    .title { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #24313f; }
    .label { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 23px; fill: #24313f; }
    .small { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 18px; fill: #64748b; }
    .tiny { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 15px; fill: #64748b; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 20px; fill: #24313f; }
    .mono-small { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 17px; fill: #24313f; }
    .box { fill: #f8fafc; stroke: #dbe3ee; stroke-width: 2; rx: 8; }
    .blue { fill: #dbeafe; stroke: #93c5fd; stroke-width: 2.5; rx: 8; }
    .orange { fill: #ffedd5; stroke: #fdba74; stroke-width: 2.5; rx: 8; }
    .green { fill: #dcfce7; stroke: #86efac; stroke-width: 2.5; rx: 8; }
    .red { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2.5; rx: 8; }
    .line { fill: none; stroke: #24313f; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .thin { fill: none; stroke: #dbe3ee; stroke-width: 2; }
    .arrow { fill: none; stroke: #24313f; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-dark); }
    .arrow-blue { fill: none; stroke: #2563eb; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
    .one { fill: #dbeafe; stroke: #93c5fd; stroke-width: 2; }
    .zero { fill: #ffedd5; stroke: #fdba74; stroke-width: 2; }
    .hit-one { fill: #bfdbfe; stroke: #2563eb; stroke-width: 2; }
    .hit-zero { fill: #fed7aa; stroke: #f97316; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#24313f"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>


