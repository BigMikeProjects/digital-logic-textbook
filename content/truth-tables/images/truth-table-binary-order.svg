    <rect class="blue" x="472" y="112" width="410" height="100"/>
    <text class="label" x="500" y="150">3 inputs -> 2<tspan baseline-shift="super" font-size="15">3</tspan> = 8 rows</text>
    <text class="small" x="500" y="184">Each row is one possible input combination.</text>
    <rect class="green" x="472" y="240" width="410" height="126"/>
    <text class="label" x="500" y="282">A is the most-significant</text>
    <text class="label" x="500" y="312">bit</text>
    <text class="small" x="500" y="342">It changes slowest: four 0s, then four 1s.</text>
    <rect class="orange" x="472" y="394" width="410" height="126"/>
    <text class="label" x="500" y="436">C is the least-significant</text>
    <text class="label" x="500" y="466">bit</text>
    <text class="small" x="500" y="496">It changes every row: 0, 1, 0, 1, ...</text>
    
