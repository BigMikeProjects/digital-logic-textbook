<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minterms & Maxterms</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        height: 100%;
        overflow: hidden;
        background: #e8e8e8;
    }
    body { display: flex; align-items: center; justify-content: center; }

    .viewport-container {
        width: 100%; max-width: 100vw;
        aspect-ratio: 16 / 9; max-height: 100vh;
        position: relative; overflow: hidden;
    }
    .design-surface {
        width: 1920px; height: 1080px;
        position: absolute; top: 0; left: 0;
        transform-origin: top left;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #0f2942;
        padding: 36px 56px;
        display: flex; flex-direction: column;
    }

    /* ---- header ---- */
    h1 {
        text-align: center; font-size: 40px; font-weight: 700;
        color: #0f2942; letter-spacing: .5px;
    }
    .subtitle {
        text-align: center; font-size: 21px; color: #5b6b7a;
        margin-top: 6px; min-height: 28px;
    }

    /* ---- tabs ---- */
    .tabs {
        display: flex; gap: 14px; justify-content: center; margin: 22px 0 18px;
    }
    .tab {
        background: #ffffff; border: 2px solid #c5ccd3; border-radius: 12px;
        padding: 13px 30px; font-size: 21px; font-weight: 600;
        color: #5b6b7a; cursor: pointer; user-select: none;
    }
    .tab .pill {
        font-size: 16px; font-weight: 700; margin-left: 8px;
        padding: 2px 9px; border-radius: 7px; background: #eef1f4; color: #5b6b7a;
    }
    .tab.active-sop { border-color: #00a3c4; color: #0f2942; box-shadow: 0 3px 0 #00a3c4; }
    .tab.active-sop .pill { background: rgba(0,212,255,.18); color: #006f86; }
    .tab.active-pos { border-color: #d68a00; color: #0f2942; box-shadow: 0 3px 0 #d68a00; }
    .tab.active-pos .pill { background: rgba(245,158,11,.20); color: #9a6300; }

    /* ---- main grid ---- */
    .content { flex: 1; display: grid; grid-template-columns: 760px 1fr; gap: 36px; min-height: 0; }

    .panel {
        background: #ffffff; border: 2px solid #c5ccd3; border-radius: 16px;
        padding: 22px 26px; display: flex; flex-direction: column;
    }
    .panel-title {
        font-size: 22px; font-weight: 700; margin-bottom: 14px;
        padding-bottom: 10px; border-bottom: 2px solid #eef1f4;
    }

    /* ---- truth table ---- */
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: center; font-size: 24px; padding: 0; height: 64px; }
    thead th {
        background: #0f2942; color: #ffffff; font-weight: 600; font-size: 22px;
    }
    /* header labels must stay white — override the per-column body colors */
    thead th.c-idx, thead th.c-var, thead th.c-term { color: #ffffff; }
    thead th:first-child { border-top-left-radius: 8px; }
    thead th:last-child { border-top-right-radius: 8px; }
    tbody tr { border-bottom: 1px solid #e3e7eb; }
    .c-idx { width: 56px; color: #8a98a6; font-size: 19px; font-weight: 600; }
    .c-var { width: 64px; font-variant-numeric: tabular-nums; color: #34465a; }
    .c-f { width: 96px; }
    .c-term { text-align: left; padding-left: 18px; font-size: 23px; color: #aeb8c2; }

    .fbox {
        display: inline-flex; align-items: center; justify-content: center;
        width: 50px; height: 44px; border-radius: 9px;
        border: 2px solid #c5ccd3; background: #f4f6f8;
        font-size: 24px; font-weight: 700; color: #8a98a6; cursor: pointer; user-select: none;
    }
    /* active row highlight + the term it contributes */
    tr.hot-sop { background: rgba(0,212,255,.14); }
    tr.hot-sop .fbox { background: #00d4ff; border-color: #00a3c4; color: #06303a; }
    tr.hot-sop .c-term { color: #06485a; text-decoration: underline; text-decoration-color: #00a3c4; text-underline-offset: 5px; }
    tr.hot-pos { background: rgba(245,158,11,.16); }
    tr.hot-pos .fbox { background: #ffffff; border-color: #d68a00; color: #9a6300; }
    tr.hot-pos .c-term { color: #6e4a00; text-decoration: underline; text-decoration-color: #d68a00; text-underline-offset: 5px; }
    .c-term b { font-weight: 700; }
    /* each variable is its own box so overbars never merge into one line */
    .v { display: inline-block; }
    .v + .v { margin-left: 2px; }
    .v.bar { text-decoration: overline; text-decoration-thickness: 1.5px; }

    /* ---- right side: expression building ---- */
    .right { display: flex; flex-direction: column; gap: 20px; min-height: 0; }
    .concept {
        background: #f4f6f8; border-left: 5px solid #94a3b8; border-radius: 8px;
        padding: 16px 20px; font-size: 19px; line-height: 1.5; color: #34465a;
    }
    .concept .lead { font-weight: 700; color: #0f2942; }
    .exprblock { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 26px; }
    .eb-label { font-size: 18px; font-weight: 700; letter-spacing: .4px; color: #5b6b7a; margin-bottom: 8px; text-transform: uppercase; }
    .eb-math {
        font-size: 34px; line-height: 1.5; color: #0f2942; min-height: 46px;
        word-spacing: 2px;
    }
    .eb-math .empty { color: #aeb8c2; font-style: italic; font-size: 26px; }
    .shorthand .eb-math { font-size: 40px; }
    .sigma { font-size: 46px; vertical-align: -4px; }
    .sub { font-size: 24px; vertical-align: -8px; font-style: italic; }
    .idxlist { font-weight: 600; }
    .accent-sop { color: #006f86; }
    .accent-pos { color: #9a6300; }

    .duality {
        background: #f4f6f8; border-radius: 10px; padding: 14px 20px;
        font-size: 21px; color: #34465a;
    }
    .duality .small { font-size: 16px; color: #5b6b7a; display: block; margin-top: 4px; }

    /* ---- footer / key legend ---- */
    .footer {
        margin-top: 18px; padding-top: 14px; border-top: 2px solid #d8dde2;
        display: flex; gap: 26px; justify-content: center; align-items: center;
        font-size: 17px; color: #5b6b7a;
    }
    .key {
        display: inline-block; min-width: 26px; text-align: center;
        background: #0f2942; color: #fff; border-radius: 6px;
        padding: 3px 9px; font-weight: 700; margin-right: 7px; font-size: 15px;
    }
</style>
</head>
<body>
<div class="viewport-container" id="viewportContainer">
    <div class="design-surface" id="designSurface">

        <h1>Minterms &amp; Maxterms</h1>
        <p class="subtitle" id="subtitle"></p>

        <div class="tabs">
            <div class="tab" id="tabSop" onclick="setTab('sop')">Minterms<span class="pill">SOP &middot; &Sigma;m</span></div>
            <div class="tab" id="tabPos" onclick="setTab('pos')">Maxterms<span class="pill">POS &middot; &Pi;M</span></div>
        </div>

        <div class="content">
            <!-- left: truth table -->
            <div class="panel">
                <div class="panel-title" id="tableTitle">Truth Table &mdash; click an output to set it</div>
                <table>
                    <thead>
                        <tr>
                            <th class="c-idx">#</th>
                            <th class="c-var">A</th>
                            <th class="c-var">B</th>
                            <th class="c-var">C</th>
                            <th class="c-f">F</th>
                            <th class="c-term" id="termHead">Minterm</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>

            <!-- right: expression building -->
            <div class="panel right">
                <div class="concept" id="concept"></div>
                <div class="exprblock">
                    <div class="canonical">
                        <div class="eb-label" id="canonLabel"></div>
                        <div class="eb-math" id="canonMath"></div>
                    </div>
                    <div class="shorthand">
                        <div class="eb-label" id="shortLabel"></div>
                        <div class="eb-math" id="shortMath"></div>
                    </div>
                </div>
                <div class="duality" id="duality"></div>
            </div>
        </div>

        <div class="footer">
            <span><span class="key">0</span>–<span class="key">7</span> toggle each row's F</span>
            <span><span class="key">&larr;</span><span class="key">&rarr;</span> switch tab</span>
            <span><span class="key">C</span> clear all</span>
        </div>
    </div>
</div>

<script>
    // ---- shared state ----
    let F = [0,0,0,0,0,0,0,0];   // output bit per row, row index = binary ABC (A = MSB)
    let tab = 'sop';
    const VARS = ['A','B','C'];

    const bitsOf = i => [(i>>2)&1, (i>>1)&1, i&1];
    const lit = (x, comp) => '<span class="v' + (comp ? ' bar' : '') + '">' + x + '</span>';

    // product term (minterm): bit 1 -> var, bit 0 -> var-bar
    function minLiteral(i){
        return bitsOf(i).map((b,k)=> lit(VARS[k], b === 0)).join('');
    }
    // sum term (maxterm): bit 1 -> var-bar, bit 0 -> var  (the dual flip)
    function maxLiteral(i){
        return '(' + bitsOf(i).map((b,k)=> lit(VARS[k], b === 1)).join(' + ') + ')';
    }

    function setTab(t){ tab = t; render(); }
    function toggleRow(i){ F[i] = F[i] ? 0 : 1; render(); }
    function clearAll(){ F = [0,0,0,0,0,0,0,0]; render(); }

    function render(){
        const isSop = tab === 'sop';

        // tab styling
        tabSop.className = 'tab' + (isSop ? ' active-sop' : '');
        tabPos.className = 'tab' + (isSop ? '' : ' active-pos');

        subtitle.textContent = isSop
            ? 'Sum of Products — collect the minterms where the output is 1'
            : 'Product of Sums — collect the maxterms where the output is 0';
        termHead.textContent = isSop ? 'Minterm' : 'Maxterm';

        // ---- truth table body ----
        let rows = '';
        for (let i = 0; i < 8; i++){
            const [a,b,c] = bitsOf(i);
            const contributes = isSop ? F[i] === 1 : F[i] === 0;
            const hot = contributes ? (isSop ? 'hot-sop' : 'hot-pos') : '';
            const label = isSop ? 'm' : 'M';
            const lit = isSop ? minLiteral(i) : maxLiteral(i);
            rows += `<tr class="${hot}">
                <td class="c-idx">${i}</td>
                <td class="c-var">${a}</td><td class="c-var">${b}</td><td class="c-var">${c}</td>
                <td class="c-f"><span class="fbox" onclick="toggleRow(${i})">${F[i]}</span></td>
                <td class="c-term"><b>${label}<span class="sub">${i}</span></b> = ${lit}</td>
            </tr>`;
        }
        tbody.innerHTML = rows;

        // index sets
        const ones  = [], zeros = [];
        for (let i=0;i<8;i++){ (F[i] ? ones : zeros).push(i); }

        // ---- right panel ----
        if (isSop){
            concept.innerHTML = '<span class="lead">A minterm m<span class="sub">i</span> is 1 for exactly one row.</span> ' +
                'List every row where F = 1, then OR those minterms together.';
            canonLabel.textContent = 'Canonical SOP';
            shortLabel.textContent = 'Minterm list';

            canonMath.innerHTML = ones.length
                ? 'F = ' + ones.map(minLiteral).join(' + ')
                : 'F = <span class="empty">click outputs to add product terms…</span>';

            shortMath.innerHTML = ones.length
                ? 'F = <span class="sigma accent-sop">&Sigma;</span><span class="sub accent-sop">m</span> ' +
                  '<span class="idxlist accent-sop">(' + ones.join(', ') + ')</span>'
                : 'F = <span class="sigma accent-sop">&Sigma;</span><span class="sub accent-sop">m</span> <span class="empty">( )</span>';
        } else {
            concept.innerHTML = '<span class="lead">A maxterm M<span class="sub">i</span> is 0 for exactly one row.</span> ' +
                'List every row where F = 0, then AND those maxterms — note the literals flip.';
            canonLabel.textContent = 'Canonical POS';
            shortLabel.textContent = 'Maxterm list';

            canonMath.innerHTML = zeros.length
                ? 'F = ' + zeros.map(maxLiteral).join(' ')
                : 'F = <span class="empty">set outputs to 0 to add sum terms…</span>';

            shortMath.innerHTML = zeros.length
                ? 'F = <span class="sigma accent-pos">&Pi;</span><span class="sub accent-pos">M</span> ' +
                  '<span class="idxlist accent-pos">(' + zeros.join(', ') + ')</span>'
                : 'F = <span class="sigma accent-pos">&Pi;</span><span class="sub accent-pos">M</span> <span class="empty">( )</span>';
        }

        // ---- duality note (same F, complementary index lists) ----
        duality.innerHTML =
            'Same function, two views: &nbsp;' +
            'F = <span class="accent-sop">&Sigma;m(' + (ones.length?ones.join(', '):'\u2013') + ')</span>' +
            ' &nbsp;=&nbsp; ' +
            'F = <span class="accent-pos">&Pi;M(' + (zeros.length?zeros.join(', '):'\u2013') + ')</span>' +
            '<span class="small">The minterm rows and maxterm rows are exact complements — together they cover all 8 rows.</span>';
    }

    // ---- keyboard ----
    document.addEventListener('keydown', e => {
        if (e.key >= '0' && e.key <= '7'){ toggleRow(parseInt(e.key,10)); }
        else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight'){ setTab(tab === 'sop' ? 'pos' : 'sop'); }
        else if (e.key === 'c' || e.key === 'C'){ clearAll(); }
    });

    render();

    // ---- responsive scaling (skill standard) ----
    const DESIGN_WIDTH = 1920, DESIGN_HEIGHT = 1080;
    function autoResize(){
        const container = document.getElementById('viewportContainer');
        const surface = document.getElementById('designSurface');
        const vw = window.innerWidth, vh = window.innerHeight;
        let cw, ch;
        if (vw / vh > 16/9){ ch = vh; cw = ch * (16/9); }
        else { cw = vw; ch = cw * (9/16); }
        container.style.width = cw + 'px';
        container.style.height = ch + 'px';
        surface.style.transform = `scale(${cw / DESIGN_WIDTH})`;
    }
    autoResize();
    let rt;
    window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(autoResize, 50); });
    window.addEventListener('orientationchange', () => setTimeout(autoResize, 100));
</script>
</body>
</html>
