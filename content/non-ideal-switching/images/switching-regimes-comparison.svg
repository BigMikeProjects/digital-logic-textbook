<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 590" width="900" height="590">

  <style>
    svg { background: #fff; }
    .title { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #24313f; }
    .label { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 23px; fill: #24313f; }
    .small { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 18px; fill: #64748b; }
    .tiny { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 15px; fill: #64748b; }
    .math { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 20px; fill: #24313f; }
    .wire { fill: none; stroke: #24313f; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .thin { fill: none; stroke: #dbe3ee; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .dash { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 8; stroke-linecap: round; }
    .current { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
    .arrow { fill: none; stroke: #24313f; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-dark); }
    .box { fill: #f8fafc; stroke: #dbe3ee; stroke-width: 2.5; rx: 8; }
    .blue { fill: #dbeafe; stroke: #93c5fd; stroke-width: 2.5; rx: 8; }
    .orange { fill: #ffedd5; stroke: #fdba74; stroke-width: 2.5; rx: 8; }
    .green { fill: #dcfce7; stroke: #86efac; stroke-width: 2.5; rx: 8; }
    .red { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2.5; rx: 8; }
    .node { fill: #fff; stroke: #24313f; stroke-width: 3; }
    .res { fill: #fff; stroke: #24313f; stroke-width: 3; rx: 7; }
    .rail { fill: #24313f; }
    .bar-bg { fill: #e2e8f0; }
    .bar-good { fill: #16a34a; }
    .bar-warn { fill: #f97316; }
    .bar-bad { fill: #dc2626; }
  </style>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#24313f"/>
    </marker>
  </defs>

<text class="title" x="52" y="58">Three switching regimes</text><rect class="box" x="58" y="100" width="150" height="58"/><text class="small" x="76" y="136">Case</text><rect class="box" x="208" y="100" width="210" height="58"/><text class="small" x="226" y="136">Resistance model</text><rect class="box" x="418" y="100" width="250" height="58"/><text class="small" x="436" y="136">Output level</text><rect class="box" x="668" y="100" width="210" height="58"/><text class="small" x="686" y="136">Static current</text><rect class="green" x="58" y="158" width="150" height="92"/><text class="label" x="76" y="196">Ideal</text><rect class="box" x="208" y="158" width="210" height="92"/><text class="small" x="226" y="196">0 / inf</text><rect class="box" x="418" y="158" width="250" height="92"/><text class="small" x="436" y="196">0 or 5 V exactly</text><rect class="box" x="668" y="158" width="210" height="92"/><text class="small" x="686" y="196">none</text><rect class="blue" x="58" y="250" width="150" height="92"/><text class="label" x="76" y="288">Typical</text><rect class="box" x="208" y="250" width="210" height="92"/><text class="small" x="226" y="288">1 k / 1 G</text><rect class="box" x="418" y="250" width="250" height="92"/><text class="small" x="436" y="288">~5 uV or ~5 V</text><rect class="box" x="668" y="250" width="210" height="92"/><text class="small" x="686" y="288">tiny leakage</text><rect class="red" x="58" y="342" width="150" height="92"/><text class="label" x="76" y="380">Degraded</text><rect class="box" x="208" y="342" width="210" height="92"/><text class="small" x="226" y="380">near 1 k / 9 k</text><rect class="box" x="418" y="342" width="250" height="92"/><text class="small" x="436" y="380">0.5 V or 4.5 V</text><text class="tiny" x="436" y="408">off the rail</text><rect class="box" x="668" y="342" width="210" height="92"/><text class="small" x="686" y="380">large</text><text class="tiny" x="686" y="408">power spikes</text>
    <rect class="orange" x="150" y="462" width="650" height="80"/>
    <text class="label" x="184" y="512">The same divider equation explains all three cases.</text>
    
</svg>
