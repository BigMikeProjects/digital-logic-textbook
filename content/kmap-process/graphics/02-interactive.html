<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Map Vocabulary of Minimization</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root{
    --bg:#e9edf2;
    --surface:#ffffff;
    --surface-2:#f4f7fb;
    --ink:#102a43;
    --ink-soft:#41556b;
    --ink-mute:#8198af;
    --line:#d4dde7;
    --cyan:#0aa5c4;       /* D / featured */
    --cyan-fill:rgba(10,165,196,0.16);
    --cyan-band:rgba(10,165,196,0.10);
    --amber:#e0890b;      /* BC / secondary */
    --amber-fill:rgba(224,137,11,0.18);
    --amber-band:rgba(224,137,11,0.10);
    --violet:#7c3aed;     /* A'B / tertiary */
    --violet-fill:rgba(124,58,237,0.14);
    --violet-band:rgba(124,58,237,0.09);
    --gray:#6b7f95;       /* generic implicant / LOW */
    --gray-fill:rgba(107,127,149,0.12);
    --reject:#d23b54;     /* rejected */
  }

  html, body { height:100%; overflow:hidden; background:var(--bg); }
  body{
    display:flex; align-items:center; justify-content:center;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    -webkit-user-select:none; user-select:none;
  }

  .viewport-container{
    width:100%; max-width:100vw; aspect-ratio:16/9; max-height:100vh;
    position:relative; overflow:hidden;
  }
  .design-surface{
    width:1920px; height:1080px; position:absolute; top:0; left:0;
    transform-origin:top left; color:var(--ink);
    padding:34px 50px 24px; display:flex; flex-direction:column;
  }

  /* ---------- Header ---------- */
  .head{ display:flex; align-items:flex-end; justify-content:space-between; padding-bottom:14px; border-bottom:2px solid var(--line); }
  .head h1{ font-size:34px; font-weight:800; letter-spacing:-.3px; color:var(--ink); white-space:nowrap; }
  .head .sub{ font-size:19px; color:var(--ink-mute); margin-top:4px; font-weight:500;}
  .func{ text-align:right; font-size:20px; color:var(--ink-soft); }
  .func b{ color:var(--cyan); font-weight:700; }
  .func .mono{ font-family:'Consolas','SF Mono',monospace; font-size:19px; color:var(--ink);}

  /* ---------- Body ---------- */
  .body{ flex:1; display:flex; gap:40px; min-height:0; padding-top:20px; }
  .col-map{ width:660px; flex:0 0 660px; display:flex; flex-direction:column; }
  .col-right{ flex:1; min-width:0; display:flex; flex-direction:column; }

  .map-card, .right-card{
    background:var(--surface); border:1px solid var(--line); border-radius:20px;
    box-shadow:0 8px 24px rgba(16,42,67,0.06);
    flex:1; min-height:0; display:flex; flex-direction:column;
  }
  .map-card{ padding:18px 20px 10px; }
  .map-title{ font-size:18px; font-weight:700; color:var(--ink-soft); text-align:center; letter-spacing:.5px; text-transform:uppercase; }
  .map-wrap{ flex:1; display:flex; align-items:center; justify-content:center; min-height:0; }
  svg{ width:100%; height:100%; }

  .right-card{ padding:34px 40px; }

  /* term layout */
  .badge{ display:inline-block; font-size:15px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase;
    padding:6px 14px; border-radius:999px; color:#fff; margin-bottom:14px; }
  .term-name{ font-size:42px; font-weight:800; color:var(--ink); margin-bottom:18px; letter-spacing:-.5px; }
  .def{ font-size:25px; line-height:1.5; color:var(--ink); margin-bottom:22px; font-weight:500;}
  .row-note{ display:flex; gap:14px; align-items:flex-start; margin-bottom:16px; }
  .row-note .tag{ flex:0 0 auto; font-size:14px; font-weight:800; letter-spacing:.6px; text-transform:uppercase;
    padding:6px 12px; border-radius:8px; margin-top:2px; }
  .row-note .txt{ font-size:21px; line-height:1.5; color:var(--ink-soft); }
  .tag.map{ background:var(--cyan-fill); color:var(--cyan); }
  .tag.key{ background:var(--surface-2); color:var(--ink-mute); border:1px solid var(--line); }
  code, .mono{ font-family:'Consolas','SF Mono',monospace; }
  .lit{ color:var(--cyan); font-weight:700; }
  .pt{ color:var(--amber); font-weight:700; }
  .vt{ color:var(--violet); font-weight:700; }
  .em-cyan{color:var(--cyan);font-weight:700;}
  .em-amber{color:var(--amber);font-weight:700;}
  .em-violet{color:var(--violet);font-weight:700;}

  /* intro goal + list */
  .goal-box{ background:linear-gradient(135deg, rgba(10,165,196,0.12), rgba(10,165,196,0.05));
    border:1.5px solid var(--cyan); border-left:8px solid var(--cyan); border-radius:14px;
    padding:22px 26px; font-size:27px; line-height:1.5; color:var(--ink); font-weight:600;
    margin-bottom:28px; box-shadow:0 6px 18px rgba(10,165,196,0.10); }
  .goal-box b{ color:var(--cyan); font-weight:800; }
  .setup-head{ display:inline-block; font-size:15px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase;
    padding:6px 14px; border-radius:999px; color:#fff; background:#41556b; margin-bottom:16px; }
  .roadmap{ list-style:none; display:flex; flex-direction:column; gap:11px; margin-top:2px;}
  .roadmap li{ font-size:23px; color:var(--ink-soft); display:flex; gap:14px; align-items:center;}
  .roadmap .n{ flex:0 0 36px; height:36px; border-radius:50%; background:var(--surface-2); border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center; font-weight:800; font-size:18px; color:var(--ink-mute);}
  .roadmap b{ color:var(--ink); font-weight:700;}

  /* minimization */
  .stmt{ font-size:23px; line-height:1.5; color:var(--ink); margin-bottom:16px; }
  .stmt .lead{ font-weight:800; color:var(--ink); }
  .result-box{ margin-top:6px; background:var(--surface-2); border:1px solid var(--line); border-left:6px solid var(--cyan);
    border-radius:12px; padding:18px 22px; }
  .result-box .eq{ font-size:34px; font-weight:800; }
  .result-box .cost{ font-size:20px; color:var(--ink-soft); margin-top:8px;}

  /* ---------- Step rail ---------- */
  .rail{ display:flex; align-items:center; gap:10px; padding-top:14px; }
  .rail .dots{ display:flex; gap:9px; }
  .dot{ width:13px; height:13px; border-radius:50%; background:var(--line); transition:all .15s; }
  .dot.active{ background:var(--cyan); transform:scale(1.25); }
  .dot.done{ background:var(--ink-mute); }
  .rail .hint{ margin-left:auto; font-size:17px; color:var(--ink-mute); }
  .rail .hint kbd{ font-family:'Consolas',monospace; background:var(--surface); border:1px solid var(--line);
    border-bottom-width:2px; border-radius:6px; padding:2px 8px; font-size:15px; color:var(--ink-soft); margin:0 2px;}
  .rail .label{ font-size:18px; font-weight:700; color:var(--ink-soft); min-width:160px;}
</style>
</head>
<body>
<div class="viewport-container" id="viewportContainer">
  <div class="design-surface" id="designSurface">

    <div class="head">
      <div>
        <h1>Karnaugh Maps — Terms, Definitions and Process for Minimization</h1>
        <div class="sub">Five terms (plus don't-cares) that turn a map into a minimal Boolean expression</div>
      </div>
      <div class="func">
        running function<br>
        <span class="mono"><b>F</b>(A,B,C,D) = Σm(1,3,5,7,9,11,13,14,15) + d(4,6)</span>
      </div>
    </div>

    <div class="body">
      <div class="col-map">
        <div class="map-card">
          <div class="map-title">4-Variable K-Map</div>
          <div class="map-wrap">
            <svg id="kmap" viewBox="0 0 580 600" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </div>
      </div>
      <div class="col-right">
        <div class="right-card" id="rightCard"></div>
      </div>
    </div>

    <div class="rail">
      <div class="label" id="railLabel"></div>
      <div class="dots" id="dots"></div>
      <div class="hint"><kbd>←</kbd><kbd>→</kbd> step &nbsp;·&nbsp; <kbd>R</kbd> reset &nbsp;·&nbsp; <kbd>0</kbd>–<kbd>8</kbd> jump</div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   GEOMETRY  (4x4 K-map, AB rows / CD cols, Gray order)
   ============================================================ */
const CS = 108, GX = 120, GY = 120, INSET = 11, RAD = 16;
const ROW_GRAY = [0,1,3,2];   // AB value per row (00,01,11,10)
const COL_GRAY = [0,1,3,2];   // CD value per col
const GRAY_LBL = ["00","01","11","10"];

// minterm[r][c] = AB*4 + CD
const cellMint = [];
const mintPos = {};
for(let r=0;r<4;r++){ cellMint[r]=[]; for(let c=0;c<4;c++){ const m=ROW_GRAY[r]*4+COL_GRAY[c]; cellMint[r][c]=m; mintPos[m]={r,c}; } }

const ONSET = new Set([1,3,5,7,9,11,13,14,15]);
const DCSET = new Set([4,6]);
function cellVal(m){ return ONSET.has(m)?'1':(DCSET.has(m)?'X':'0'); }

function cx(c){ return GX + c*CS; }
function cy(r){ return GY + r*CS; }

// group bounding boxes (row/col ranges)
const GROUPS = {
  D:    {r0:0,r1:3,c0:1,c1:2},   // literal D / PI / EPI
  BC:   {r0:1,r1:2,c0:2,c1:3},   // PI / EPI
  ApB:  {r0:1,r1:1,c0:0,c1:3},   // A'B  (non-essential PI)
  ABpD: {r0:0,r1:0,c0:1,c1:2},   // A'B'D (baby implicant)
};
function loopRect(g){
  return {
    x: cx(g.c0)+INSET, y: cy(g.r0)+INSET,
    w: (g.c1-g.c0+1)*CS - 2*INSET, h: (g.r1-g.r0+1)*CS - 2*INSET
  };
}
function bandRect(g){
  return { x:cx(g.c0)+3, y:cy(g.r0)+3, w:(g.c1-g.c0+1)*CS-6, h:(g.r1-g.r0+1)*CS-6 };
}

const SVGNS="http://www.w3.org/2000/svg";
function el(tag, attrs={}, text){ const e=document.createElementNS(SVGNS,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); if(text!=null) e.textContent=text; return e; }

/* ---------- static grid ---------- */
const svg = document.getElementById('kmap');
const gBands  = el('g'); const gGrid = el('g'); const gLoops = el('g'); const gMarks = el('g'); const gAxis = el('g');
svg.append(gBands,gGrid,gMarks,gLoops,gAxis);

function drawGridStatic(){
  // axis labels - corner
  gAxis.append(el('line',{x1:42,y1:52,x2:112,y2:112,stroke:'var(--line)','stroke-width':2}));
  gAxis.append(el('text',{x:96,y:74,'font-size':22,'font-weight':700,fill:'var(--ink-soft)','text-anchor':'middle'},'CD'));
  gAxis.append(el('text',{x:56,y:104,'font-size':22,'font-weight':700,fill:'var(--ink-soft)','text-anchor':'middle'},'AB'));
  // column headers
  for(let c=0;c<4;c++){
    gAxis.append(el('text',{x:cx(c)+CS/2,y:104,'font-size':24,'font-weight':700,fill:'var(--ink-soft)','text-anchor':'middle'},GRAY_LBL[c]));
  }
  // row headers
  for(let r=0;r<4;r++){
    gAxis.append(el('text',{x:80,y:cy(r)+CS/2+8,'font-size':24,'font-weight':700,fill:'var(--ink-soft)','text-anchor':'middle'},GRAY_LBL[r]));
  }
  // cell fills (no per-cell stroke; grid lines drawn explicitly below)
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const m=cellMint[r][c], v=cellVal(m);
    const fill = v==='X' ? '#eef3f8' : '#ffffff';
    gGrid.append(el('rect',{x:cx(c),y:cy(r),width:CS,height:CS,fill:fill}));
  }
  // internal grid lines (crisp + uniform)
  const GLINE='#8295aa';
  for(let i=1;i<4;i++){
    const heavy = (i===2);            // center cross marks the variable quadrants
    const col = heavy ? '#52677e' : GLINE;
    const w   = heavy ? 3 : 2;
    gGrid.append(el('line',{x1:cx(i),y1:cy(0),x2:cx(i),y2:cy(0)+4*CS,stroke:col,'stroke-width':w}));
    gGrid.append(el('line',{x1:cx(0),y1:cy(i),x2:cx(0)+4*CS,y2:cy(i),stroke:col,'stroke-width':w}));
  }
  // bold outer frame
  gGrid.append(el('rect',{x:cx(0),y:cy(0),width:4*CS,height:4*CS,fill:'none',
    stroke:'#33485f','stroke-width':4}));
  // cell labels
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const m=cellMint[r][c], v=cellVal(m);
    gGrid.append(el('text',{x:cx(c)+9,y:cy(r)+24,'font-size':16,'font-weight':600,fill:'var(--ink-mute)'},'m'+m));
    let vfill = v==='1' ? 'var(--ink)' : (v==='X' ? '#7e93a8' : '#b9c6d4');
    const t = el('text',{x:cx(c)+CS/2,y:cy(r)+CS/2+22,'font-size':46,'font-weight':800,fill:vfill,'text-anchor':'middle'},v);
    if(v==='X') t.setAttribute('font-style','italic');
    t.setAttribute('class','cellval'); t.dataset.m=m;
    gGrid.append(t);
  }
}
drawGridStatic();

/* ---------- dynamic overlay rendering ---------- */
const COLOR = {
  cyan:{stroke:'var(--cyan)',fill:'var(--cyan-fill)',band:'var(--cyan-band)'},
  amber:{stroke:'var(--amber)',fill:'var(--amber-fill)',band:'var(--amber-band)'},
  violet:{stroke:'var(--violet)',fill:'var(--violet-fill)',band:'var(--violet-band)'},
  gray:{stroke:'var(--gray)',fill:'var(--gray-fill)',band:'rgba(107,127,149,0.08)'},
  reject:{stroke:'var(--reject)',fill:'rgba(210,59,84,0.08)',band:''},
};

function renderMap(cfg){
  gBands.innerHTML=''; gLoops.innerHTML=''; gMarks.innerHTML='';

  // faint literal bands
  (cfg.bands||[]).forEach(b=>{
    const g=GROUPS[b.group]||b.rect, col=COLOR[b.color];
    const rect = b.rect ? b.rect : bandRect(g);
    gBands.append(el('rect',{x:rect.x,y:rect.y,width:rect.w,height:rect.h,rx:10,fill:col.band}));
    if(b.label){
      gBands.append(el('text',{x:rect.x+rect.w-10,y:rect.y+30,'font-size':22,'font-weight':800,
        fill:col.stroke,'text-anchor':'end','font-style':'italic'},b.label));
    }
  });

  // distinguished-cell marks (drawn under loops), colored by owning PI
  (cfg.marks||[]).forEach(mk=>{
    const p=mintPos[mk.m], col=COLOR[mk.color];
    gMarks.append(el('rect',{x:cx(p.c)+5,y:cy(p.r)+5,width:CS-10,height:CS-10,rx:12,
      fill:col.fill,stroke:col.stroke,'stroke-width':3.5}));
    gMarks.append(el('text',{x:cx(p.c)+CS-12,y:cy(p.r)+CS-12,'font-size':15,'font-weight':800,
      fill:col.stroke,'text-anchor':'end'},'only '+mk.lbl));
  });

  // don't-care rings
  if(cfg.dcRing){
    [4,6].forEach(m=>{
      const p=mintPos[m];
      gMarks.append(el('rect',{x:cx(p.c)+9,y:cy(p.r)+9,width:CS-18,height:CS-18,rx:12,
        fill:'none',stroke:'var(--amber)','stroke-width':4,'stroke-dasharray':'7 6'}));
    });
  }

  // loops
  (cfg.loops||[]).forEach(L=>{
    const g=GROUPS[L.group], col=COLOR[L.color], R=loopRect(g);
    const op = L.muted ? 0.35 : 1;
    const sw = L.muted ? 4 : 6.5;
    const attrs={x:R.x,y:R.y,width:R.w,height:R.h,rx:RAD,ry:RAD,
      fill:L.fill===false?'none':col.fill, stroke:col.stroke,'stroke-width':sw, opacity:op};
    if(L.style==='dashed') attrs['stroke-dasharray']='12 9';
    gLoops.append(el('rect',attrs));
    if(L.label){
      const lx = (L.labelPos==='right')? R.x+R.w-8 : R.x+10;
      const anchor = (L.labelPos==='right')?'end':'start';
      const ly = (L.labelBottom? R.y+R.h-12 : R.y+30);
      const bg = el('text',{x:lx,y:ly,'font-size':24,'font-weight':800,fill:col.stroke,'text-anchor':anchor,opacity:op});
      bg.textContent=L.label;
      gLoops.append(bg);
    }
    if(L.reject){
      // X mark badge near top-left
      gLoops.append(el('text',{x:R.x+R.w-10,y:R.y+30,'font-size':30,'font-weight':900,
        fill:'var(--reject)','text-anchor':'end'},'✗'));
    }
  });
}

/* ============================================================
   STEP DEFINITIONS
   ============================================================ */
const COLORS = {literal:'#0aa5c4', product:'#e0890b', dc:'#e0890b', implicant:'#6b7f95',
                prime:'#0aa5c4', essential:'#0aa5c4', nest:'#7c3aed', min:'#0aa5c4'};

const STEPS = [
  /* 0 INTRO */
  {
    label:'Overview',
    map:{},
    right:()=>`
      <div class="badge" style="background:${COLORS.min}">The Goal</div>
      <div class="term-name" style="margin-bottom:14px">Minimization</div>
      <div class="goal-box">
        Rewrite <b>F</b> as a <b>minimal sum-of-products</b> form — the <b>fewest product terms</b>, then the <b>fewest total literals</b> — by reading groups straight off the K-map.
      </div>
      <div class="setup-head">Setup — the vocabulary we'll need</div>
      <ul class="roadmap">
        <li><span class="n">1</span><b>Literal</b> — one variable, true or complemented</li>
        <li><span class="n">2</span><b>Product term</b> — an AND of literals</li>
        <li><span class="n">+</span><b>Don't-care</b> — an unspecified output (free 0/1)</li>
        <li><span class="n">3</span><b>Implicant</b> — a product term that implies F</li>
        <li><span class="n">4</span><b>Prime implicant</b> — an implicant that can't grow</li>
        <li><span class="n">5</span><b>Essential prime implicant</b> — the only PI on some 1</li>
      </ul>`
  },
  /* 1 LITERAL */
  {
    label:'1 · Literal',
    map:{ bands:[{group:'D',color:'cyan',label:'D = 1'}] },
    right:()=>`
      <div class="badge" style="background:${COLORS.literal}">Term 1</div>
      <div class="term-name">Literal</div>
      <div class="def">A single variable in either <b>true</b> or <b>complemented</b> form: <span class="lit">A, A′, B, B′, …</span></div>
      <div class="row-note"><div class="tag map">on the map</div>
        <div class="txt">The literal <span class="lit">D</span> selects exactly the half of the map where <span class="mono">D = 1</span> (the middle two columns).</div></div>
      <div class="row-note"><div class="tag key">why it matters</div>
        <div class="txt">Literals are the <b>atoms</b>. Everything else is built by AND-ing literals together.</div></div>`
  },
  /* 2 PRODUCT TERM */
  {
    label:'2 · Product term',
    map:{ bands:[{group:'ApB_full',color:'gray'}], // placeholder replaced below
          loops:[] },
    right:()=>`
      <div class="badge" style="background:${COLORS.product}">Term 2</div>
      <div class="term-name">Product term</div>
      <div class="def">An <b>AND of literals</b>, with each variable appearing at most once — e.g. <span class="pt">B·C</span>.</div>
      <div class="row-note"><div class="tag map">on the map</div>
        <div class="txt"><span class="pt">B·C</span> is the overlap of the <span class="em-violet">B=1</span> rows and the <span class="em-amber">C=1</span> columns — a clean 2×2 block.</div></div>
      <div class="row-note"><div class="tag key">edge cases</div>
        <div class="txt">A lone literal (<span class="lit">D</span>) is a product term, and the constant <span class="mono">1</span> is the empty one. A <b>minterm</b> names every variable exactly once.</div></div>`
  },
  /* 3 DON'T-CARE */
  {
    label:'+ · Don\u2019t-care',
    map:{ dcRing:true },
    right:()=>`
      <div class="badge" style="background:${COLORS.dc}">Special input</div>
      <div class="term-name">Don't-care</div>
      <div class="def">An input combination whose output is <b>unspecified</b> — we are free to treat it as 0 or 1.</div>
      <div class="row-note"><div class="tag map">on the map</div>
        <div class="txt">Cells <span class="em-amber">m4</span> and <span class="em-amber">m6</span> hold <span class="mono">X</span>. We may pull them into a group whenever it makes the group bigger.</div></div>
      <div class="row-note"><div class="tag key">the rule</div>
        <div class="txt">Don't-cares are <b>optional 1's</b>: use the ones that enlarge a group, ignore the rest. (Watch <span class="em-amber">m6</span> earn its keep next.)</div></div>`
  },
  /* 4 IMPLICANT */
  {
    label:'3 · Implicant',
    map:{ loops:[{group:'ABpD',color:'gray',label:'A′B′D',fill:true}] },
    right:()=>`
      <div class="badge" style="background:${COLORS.implicant}">Term 3</div>
      <div class="term-name">Implicant</div>
      <div class="def">A product term that <b>implies F</b>: wherever it equals 1, F equals 1. On the map — any legal group sitting entirely on <span class="mono">1</span>'s (and <span class="mono">X</span>'s).</div>
      <div class="row-note"><div class="tag map">on the map</div>
        <div class="txt"><span class="mono" style="color:var(--gray);font-weight:700">A′B′D</span> covers {m1, m3} — a valid implicant. But it can still <b>grow</b>.</div></div>
      <div class="row-note"><div class="tag key">smallest case</div>
        <div class="txt">Every single <span class="mono">1</span> is itself an implicant — the smallest kind.</div></div>`
  },
  /* 5 PRIME IMPLICANT */
  {
    label:'4 · Prime implicant',
    map:{ loops:[
      {group:'D',color:'cyan',label:'D',labelPos:'left'},
      {group:'BC',color:'amber',label:'BC',labelPos:'right'},
      {group:'ApB',color:'violet',label:'A′B',labelPos:'left',labelBottom:true},
    ]},
    right:()=>`
      <div class="badge" style="background:${COLORS.prime}">Term 4</div>
      <div class="term-name">Prime implicant</div>
      <div class="def">An implicant that <b>cannot be enlarged</b> — remove any literal and it stops implying F. These are the <b>maximal</b> groups.</div>
      <div class="row-note"><div class="tag map">on the map</div>
        <div class="txt"><span class="mono" style="color:var(--gray)">A′B′D</span> expands to the literal <span class="em-cyan">D</span>. This F has <b>three</b> PIs: <span class="em-cyan">D</span>, <span class="em-amber">BC</span>, <span class="em-violet">A′B</span> — and <span class="em-amber">BC</span> only exists because don't-care <span class="mono">m6</span> filled the corner.</div></div>
      <div class="row-note"><div class="tag key">test</div>
        <div class="txt">No larger valid group contains it.</div></div>`
  },
  /* 6 ESSENTIAL PI */
  {
    label:'5 · Essential PI',
    map:{
      marks:[{m:1,color:'cyan',lbl:'D'},{m:14,color:'amber',lbl:'BC'}],
      loops:[
        {group:'D',color:'cyan',label:'D',labelPos:'left'},
        {group:'BC',color:'amber',label:'BC',labelPos:'right'},
        {group:'ApB',color:'violet',label:'A′B',labelPos:'left',labelBottom:true,style:'dashed',muted:true,fill:false},
      ]},
    right:()=>`
      <div class="badge" style="background:${COLORS.essential}">Term 5</div>
      <div class="term-name">Essential prime implicant</div>
      <div class="def">A prime implicant that is the <b>only</b> PI covering some ON-cell — a <b>distinguished 1</b>. It must appear in every minimal solution.</div>
      <div class="row-note"><div class="tag map">on the map</div>
        <div class="txt"><span class="mono">m1</span> is covered only by <span class="em-cyan">D</span>; <span class="mono">m14</span> only by <span class="em-amber">BC</span>. So <span class="em-cyan">D</span> and <span class="em-amber">BC</span> are <b>essential</b>.</div></div>
      <div class="row-note"><div class="tag key">contrast</div>
        <div class="txt"><span class="em-violet">A′B</span> (dashed) is a prime implicant, but no cell needs it — <b>not</b> essential.</div></div>`
  },
  /* 7 NESTING */
  {
    label:'Why it nests',
    map:{ loops:[
      {group:'D',color:'cyan',muted:true,fill:false},
      {group:'BC',color:'amber',muted:true,fill:false},
      {group:'ApB',color:'violet',muted:true,fill:false},
    ]},
    rightMode:'nest'
  },
  /* 8 MINIMIZATION */
  {
    label:'Minimization',
    map:{
      loops:[
        {group:'D',color:'cyan',label:'D',labelPos:'left'},
        {group:'BC',color:'amber',label:'BC',labelPos:'right'},
        {group:'ApB',color:'reject',label:'A′B',labelPos:'left',labelBottom:true,style:'dashed',fill:false,reject:true},
      ]},
    rightMode:'min'
  },
];

/* nested-set diagram for step 7 */
function nestSVG(){
  return `
  <svg viewBox="0 0 900 560" style="width:100%;height:auto">
    <defs></defs>
    <!-- outer: product terms -->
    <rect x="20" y="20" width="860" height="430" rx="22" fill="#f4f7fb" stroke="#cdd8e4" stroke-width="2"/>
    <text x="40" y="52" font-size="22" font-weight="800" fill="#6b7f95">PRODUCT TERMS</text>
    <text x="40" y="78" font-size="18" fill="#8198af">all ANDs of literals — A, AB, A′CD, BD, …</text>

    <!-- implicants -->
    <rect x="70" y="96" width="760" height="338" rx="20" fill="#eef3f8" stroke="#aab9c9" stroke-width="2"/>
    <text x="90" y="128" font-size="22" font-weight="800" fill="#41556b">IMPLICANTS</text>
    <text x="90" y="153" font-size="18" fill="#6b7f95">those that imply F — e.g. m1, A′B′D, BD, A′B …</text>

    <!-- prime implicants -->
    <rect x="120" y="172" width="660" height="240" rx="18" fill="rgba(124,58,237,0.08)" stroke="#7c3aed" stroke-width="2.5"/>
    <text x="142" y="206" font-size="22" font-weight="800" fill="#7c3aed">PRIME IMPLICANTS</text>
    <text x="142" y="231" font-size="18" fill="#6b6080">cannot grow —
      <tspan fill="#7c3aed" font-weight="700">{ D, BC, A′B }</tspan></text>

    <!-- essential PIs -->
    <rect x="172" y="252" width="556" height="138" rx="16" fill="rgba(10,165,196,0.14)" stroke="#0aa5c4" stroke-width="3"/>
    <text x="196" y="290" font-size="22" font-weight="800" fill="#0aa5c4">ESSENTIAL PRIME IMPLICANTS</text>
    <text x="196" y="320" font-size="20" fill="#0e6f86">forced into every minimal cover —
      <tspan fill="#0aa5c4" font-weight="800">{ D, BC }</tspan></text>
    <text x="196" y="352" font-size="17" fill="#4a8ea0" font-style="italic">A′B is prime but sits outside this ring</text>

    <!-- literals feed -->
    <text x="40" y="500" font-size="20" font-weight="700" fill="#0aa5c4">LITERALS</text>
    <text x="148" y="500" font-size="20" fill="#6b7f95">A · A′ · B · B′ · C · C′ · D · D′</text>
    <text x="40" y="528" font-size="17" fill="#8198af" font-style="italic">— the atoms that compose every product term above —</text>
  </svg>`;
}

function nestRight(){
  return `
    <div class="badge" style="background:${COLORS.nest}">Synthesis</div>
    <div class="term-name" style="margin-bottom:12px">Why the vocabulary nests</div>
    <div class="def" style="font-size:23px;margin-bottom:18px">
      essential PIs <b>⊆</b> prime implicants <b>⊆</b> implicants <b>⊆</b> product terms — all built from literals.</div>
    ${nestSVG()}`;
}

function minRight(){
  return `
    <div class="badge" style="background:${COLORS.min}">Definition</div>
    <div class="term-name" style="margin-bottom:14px">Minimization, defined</div>
    <div class="stmt"><span class="lead">A minimal SOP of F</span> is a sum of product terms that</div>
    <div class="stmt">&nbsp;&nbsp;(1) <b>equals F</b> — covers every ON-cell and no OFF-cell (don't-cares optional), and</div>
    <div class="stmt">&nbsp;&nbsp;(2) is <b>minimum cost</b>: fewest <b>product terms</b> first, then fewest <b>total literals</b>.</div>
    <div class="stmt" style="margin-top:14px"><b>Key result:</b> at least one minimal SOP uses <em>only prime implicants</em>. So minimizing =
      choosing a minimum-cost set of PIs that covers the ON-set — necessarily including <span class="em-cyan">every essential PI</span>.</div>
    <div class="result-box">
      <div class="eq"><span class="em-cyan">F</span> = <span class="em-cyan">D</span> + <span class="em-amber">B·C</span></div>
      <div class="cost">Essential <span class="em-cyan">D</span> and <span class="em-amber">BC</span> already cover everything → cost = <b>2 product terms, 3 literals</b>.
        &nbsp;<span class="em-violet">A′B</span> is a prime implicant we simply don't need.</div>
    </div>`;
}

/* ---- product-term step needs two bands + the BC loop; build it specially ---- */
function productMapCfg(){
  return {
    bands:[
      {rect:bandRect(GROUPS.ApB), color:'violet', label:'B = 1'},
      {rect:bandRect({r0:0,r1:3,c0:2,c1:3}), color:'amber', label:'C = 1'},
    ],
    loops:[{group:'BC',color:'amber',label:'B·C',labelPos:'right'}]
  };
}

/* ============================================================
   DRIVER
   ============================================================ */
let cur = 0;
const rightCard = document.getElementById('rightCard');
const railLabel = document.getElementById('railLabel');
const dotsWrap = document.getElementById('dots');
STEPS.forEach((s,i)=>{ const d=el2('div','dot'); d.id='dot'+i; dotsWrap.appendChild(d); });
function el2(tag,cls){ const e=document.createElement(tag); e.className=cls; return e; }

function render(){
  const s = STEPS[cur];
  // map
  let cfg = s.map||{};
  if(cur===2) cfg = productMapCfg();
  renderMap(cfg);
  // right
  if(s.rightMode==='nest') rightCard.innerHTML = nestRight();
  else if(s.rightMode==='min') rightCard.innerHTML = minRight();
  else rightCard.innerHTML = s.right();
  // rail
  railLabel.textContent = s.label;
  for(let i=0;i<STEPS.length;i++){
    const d=document.getElementById('dot'+i);
    d.className = 'dot' + (i===cur?' active':(i<cur?' done':''));
  }
}
function go(n){ cur = Math.max(0, Math.min(STEPS.length-1, n)); render(); }

document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){ e.preventDefault(); go(cur+1); }
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){ e.preventDefault(); go(cur-1); }
  else if(e.key==='r'||e.key==='R'){ go(0); }
  else if(/^[0-8]$/.test(e.key)){ go(parseInt(e.key,10)); }
});
render();

/* ============================================================
   RESPONSIVE SCALING
   ============================================================ */
const DESIGN_WIDTH=1920, DESIGN_HEIGHT=1080;
function autoResize(){
  const container=document.getElementById('viewportContainer');
  const surface=document.getElementById('designSurface');
  const vw=window.innerWidth, vh=window.innerHeight;
  let cw,ch;
  if(vw/vh > 16/9){ ch=vh; cw=ch*(16/9); } else { cw=vw; ch=cw*(9/16); }
  container.style.width=cw+'px'; container.style.height=ch+'px';
  surface.style.transform='scale('+(cw/DESIGN_WIDTH)+')';
}
autoResize();
let rt; window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(autoResize,50); });
window.addEventListener('orientationchange',()=>setTimeout(autoResize,100));
</script>
