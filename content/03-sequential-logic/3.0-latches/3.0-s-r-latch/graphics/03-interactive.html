<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-R Latch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .viewport-container {
            width: 100%;
            max-width: 100vw;
            aspect-ratio: 16 / 9;
            max-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .design-surface {
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 0; left: 0;
            transform-origin: top left;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            padding: 30px 60px 24px;
            color: #e0e0e0;
        }
        h1 {
            text-align: center;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(90deg, #4fc3f7 0%, #ab47bc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #90a4ae;
            font-size: 18px;
            margin-bottom: 16px;
        }
        .content {
            flex: 1;
            display: flex;
            gap: 40px;
            align-items: stretch;
            min-height: 0;
        }
        .circuit-panel {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .control-panel {
            flex: 0.7;
            display: flex;
            flex-direction: column;
            gap: 18px;
            justify-content: center;
        }
        .input-group, .state-display {
            background: rgba(255,255,255,0.04);
            border: 1px solid #2d3a5a;
            border-radius: 12px;
            padding: 22px 24px;
        }
        .input-group h2, .state-display h2 {
            font-size: 20px;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 16px;
        }
        .btn-row { display: flex; gap: 16px; }
        .latch-btn {
            flex: 1;
            padding: 18px 0;
            font-size: 24px;
            font-weight: 700;
            border: 3px solid;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            user-select: none;
        }
        .latch-btn:active { transform: scale(0.96); }
        .latch-btn.disabled {
            opacity: 0.35;
            pointer-events: none;
        }
        .btn-set {
            background: rgba(76, 175, 80, 0.12);
            border-color: #4caf50;
            color: #66bb6a;
        }
        .btn-set:hover { background: rgba(76, 175, 80, 0.25); }
        .btn-set.active {
            background: #4caf50;
            color: #fff;
            box-shadow: 0 0 24px rgba(76, 175, 80, 0.4);
        }
        .btn-reset {
            background: rgba(239, 83, 80, 0.12);
            border-color: #ef5350;
            color: #ef5350;
        }
        .btn-reset:hover { background: rgba(239, 83, 80, 0.25); }
        .btn-reset.active {
            background: #ef5350;
            color: #fff;
            box-shadow: 0 0 24px rgba(239, 83, 80, 0.4);
        }
        .output-row { display: flex; gap: 16px; margin-bottom: 12px; }
        .output-box {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            border-radius: 10px;
            border: 2px solid #2d3a5a;
            background: rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .output-box .label { font-size: 15px; color: #8b949e; margin-bottom: 4px; }
        .output-box .value {
            font-size: 40px;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            transition: all 0.3s;
        }
        .output-box.high {
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }
        .output-box.high .value { color: #4fc3f7; }
        .output-box.low { border-color: #3d4a5a; }
        .output-box.low .value { color: #5a6a7a; }
        .memory-state {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .memory-state.storing-1 {
            background: rgba(76, 175, 80, 0.15);
            border: 2px solid #4caf50;
            color: #66bb6a;
        }
        .memory-state.storing-0 {
            background: rgba(239, 83, 80, 0.1);
            border: 2px solid #ef5350;
            color: #ef5350;
        }

        /* Narration bar */
        .narration {
            background: rgba(79, 195, 247, 0.06);
            border: 1px solid rgba(79, 195, 247, 0.2);
            border-radius: 12px;
            padding: 16px 24px;
            min-height: 72px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 12px;
        }
        .narration .step-icon {
            font-size: 24px;
            flex-shrink: 0;
            width: 40px;
            text-align: center;
        }
        .narration .step-text {
            font-size: 20px;
            color: #b0bec5;
            line-height: 1.5;
        }
        .narration .step-text .hl { color: #4fc3f7; font-weight: 600; }
        .narration .step-text .hl-green { color: #66bb6a; font-weight: 600; }
        .narration .step-text .hl-red { color: #ef5350; font-weight: 600; }
        .narration .step-text .hl-yellow { color: #ffc107; font-weight: 600; }

        /* Speed control */
        .speed-control {
            background: rgba(255,255,255,0.04);
            border: 1px solid #2d3a5a;
            border-radius: 12px;
            padding: 16px 24px;
        }
        .speed-control label {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 8px;
            display: block;
        }
        .speed-btns { display: flex; gap: 8px; }
        .speed-btn {
            flex: 1;
            padding: 8px;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid #2d3a5a;
            border-radius: 8px;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            transition: all 0.15s;
        }
        .speed-btn:hover { border-color: #4a5a7a; color: #ccc; }
        .speed-btn.active {
            border-color: #4fc3f7;
            color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }
    </style>
</head>
<body>

<div class="viewport-container" id="viewportContainer">
    <div class="design-surface" id="designSurface">
        <h1>S-R Latch</h1>
        <div class="subtitle">Set-Reset Memory &mdash; Watch the Feedback Loop in Action</div>

        <div class="content">
            <div class="circuit-panel">
                <canvas id="circuit" width="960" height="700"></canvas>
            </div>

            <div class="control-panel">
                <div class="input-group">
                    <h2>Inputs (click to toggle)</h2>
                    <div class="btn-row">
                        <div class="latch-btn btn-set" id="btn-set">SET (S)</div>
                        <div class="latch-btn btn-reset" id="btn-reset">RESET (R)</div>
                    </div>
                </div>

                <div class="state-display">
                    <h2>Outputs</h2>
                    <div class="output-row">
                        <div class="output-box low" id="out-q">
                            <div class="label">Q</div>
                            <div class="value">0</div>
                        </div>
                        <div class="output-box high" id="out-qbar">
                            <div class="label">Q&#x0305;</div>
                            <div class="value">1</div>
                        </div>
                    </div>
                    <div class="memory-state storing-0" id="memory-state">Storing 0</div>
                </div>

                <div class="speed-control">
                    <label>Animation Speed</label>
                    <div class="speed-btns">
                        <div class="speed-btn" data-speed="1200">Slow</div>
                        <div class="speed-btn active" data-speed="750">Normal</div>
                        <div class="speed-btn" data-speed="350">Fast</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="narration" id="narration">
            <div class="step-icon" id="step-icon">&#9654;</div>
            <div class="step-text" id="step-text">
                Click <span class="hl-green">SET</span> to assert S and watch the signal propagate through the gates.
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================
    // RESPONSIVE SCALING
    // ============================================
    const DESIGN_WIDTH = 1920;
    const DESIGN_HEIGHT = 1080;

    function autoResize() {
        const container = document.getElementById('viewportContainer');
        const surface = document.getElementById('designSurface');
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let cw, ch;
        if (vw / vh > 16 / 9) { ch = vh; cw = ch * (16 / 9); }
        else { cw = vw; ch = cw * (9 / 16); }
        container.style.width = cw + 'px';
        container.style.height = ch + 'px';
        surface.style.transform = `scale(${cw / DESIGN_WIDTH})`;
    }

    // ============================================
    // LATCH STATE
    // ============================================
    let S = 0, R = 0, Q = 0, Qbar = 1;
    let animStepDelay = 750;

    // Per-wire displayed values (separate from logic state, for animation)
    let wire = {
        s_in: 0,       // S input wire
        r_in: 0,       // R input wire
        top_out: 0,    // Top NOR output (Q)
        bot_out: 1,    // Bottom NOR output (Qbar)
        q_fb: 0,       // Q feedback to bottom gate
        qbar_fb: 1,    // Qbar feedback to top gate
    };

    // Which wire/gate is highlighted (glowing)
    let glowWires = new Set();
    let glowGate = null;  // 'top' or 'bottom'

    // ============================================
    // ANIMATION SYSTEM
    // ============================================
    let animQueue = [];
    let animating = false;
    let animTimer = null;

    function queueSteps(steps) {
        animQueue = steps;
        animating = true;
        setButtonsEnabled(false);
        playNext();
    }

    function playNext() {
        if (animQueue.length === 0) {
            animating = false;
            glowWires.clear();
            glowGate = null;
            setButtonsEnabled(true);
            drawCircuit();
            return;
        }
        const step = animQueue.shift();
        glowWires.clear();
        glowGate = null;
        step.run();
        updateUI();
        drawCircuit();
        animTimer = setTimeout(playNext, step.delay || animStepDelay);
    }

    function cancelAnim() {
        if (animTimer) clearTimeout(animTimer);
        animQueue = [];
        animating = false;
        glowWires.clear();
        glowGate = null;
    }

    function setButtonsEnabled(enabled) {
        const sBtn = document.getElementById('btn-set');
        const rBtn = document.getElementById('btn-reset');
        if (enabled) {
            sBtn.classList.remove('disabled');
            rBtn.classList.remove('disabled');
        } else {
            sBtn.classList.add('disabled');
            rBtn.classList.add('disabled');
        }
    }

    // ============================================
    // ANIMATION SEQUENCES
    // ============================================

    function setNarration(icon, html) {
        document.getElementById('step-icon').textContent = icon;
        document.getElementById('step-text').innerHTML = html;
    }

    function buildAssertS() {
        // Starting: Q=0, Qbar=1 → assert S=1
        return [
            { run() {
                S = 1; wire.s_in = 1;
                glowWires.add('s_in');
                setNarration('\u2776',
                    '<span class="hl-green">S is asserted (S = 1)</span> \u2014 signal enters the bottom NOR gate.');
            }, delay: animStepDelay },
            { run() {
                // Bottom NOR evaluates: S=1, Q_fb=0 → Qbar = NOR(0,1) = 0
                Qbar = 0; wire.bot_out = 0;
                glowGate = 'bottom';
                glowWires.add('bot_out');
                setNarration('\u2777',
                    'Bottom NOR evaluates: S=1 \u2192 output <span class="hl">Q\u0305 goes to 0</span>.');
            }, delay: animStepDelay },
            { run() {
                // Qbar=0 feeds back to top NOR input
                wire.qbar_fb = 0;
                glowWires.add('qbar_fb');
                setNarration('\u2778',
                    'Q\u0305 = 0 feeds back up to the top NOR gate\u2019s second input.');
            }, delay: animStepDelay },
            { run() {
                // Top NOR evaluates: R=0, Qbar_fb=0 → Q = NOR(0,0) = 1
                Q = 1; wire.top_out = 1;
                glowGate = 'top';
                glowWires.add('top_out');
                setNarration('\u2779',
                    'Top NOR: R=0, Q\u0305=0 \u2192 both inputs LOW \u2192 <span class="hl">Q goes to 1!</span>');
            }, delay: animStepDelay },
            { run() {
                // Q=1 feeds back to bottom NOR, reinforcing
                wire.q_fb = 1;
                glowWires.add('q_fb');
                setNarration('\u277A',
                    'Q = 1 feeds back down to the bottom NOR, <span class="hl-green">reinforcing</span> Q\u0305 = 0.');
            }, delay: animStepDelay },
            { run() {
                // Stable
                setNarration('\u2714',
                    'Stable! The latch is <span class="hl-green">SET: Q = 1</span>. Now click <span class="hl-green">SET</span> again to release S and watch the <span class="hl">feedback hold</span>.');
            }, delay: animStepDelay },
        ];
    }

    function buildReleaseS() {
        // Currently: Q=1, Qbar=0, S=1 → release S=0
        return [
            { run() {
                S = 0; wire.s_in = 0;
                glowWires.add('s_in');
                setNarration('\u2776',
                    '<span class="hl-green">S is released (S = 0)</span> \u2014 can the latch hold its value?');
            }, delay: animStepDelay },
            { run() {
                // Bottom NOR re-evaluates: S=0, Q_fb=1 → NOR(1,0) = 0
                // Qbar stays 0!
                glowGate = 'bottom';
                glowWires.add('q_fb');
                setNarration('\u2777',
                    'Bottom NOR: S=0, but <span class="hl">Q = 1 still feeds back</span> \u2192 NOR(1, 0) = 0. <span class="hl">Q\u0305 stays 0!</span>');
            }, delay: animStepDelay * 1.3 },
            { run() {
                // Top NOR still stable
                glowGate = 'top';
                glowWires.add('qbar_fb');
                setNarration('\u2778',
                    'Top NOR: R=0, Q\u0305=0 \u2192 NOR(0, 0) = 1. <span class="hl">Q stays 1!</span>');
            }, delay: animStepDelay * 1.3 },
            { run() {
                setNarration('\uD83D\uDCA1',
                    'The <span class="hl">feedback loop holds Q = 1</span> even though S is gone. <span class="hl-yellow">This is memory!</span> Click <span class="hl-red">RESET</span> to clear it.');
            }, delay: animStepDelay },
        ];
    }

    function buildAssertR() {
        // Starting: Q=1, Qbar=0 → assert R=1
        return [
            { run() {
                R = 1; wire.r_in = 1;
                glowWires.add('r_in');
                setNarration('\u2776',
                    '<span class="hl-red">R is asserted (R = 1)</span> \u2014 signal enters the top NOR gate.');
            }, delay: animStepDelay },
            { run() {
                // Top NOR evaluates: R=1, Qbar_fb=0 → Q = NOR(1,0) = 0
                Q = 0; wire.top_out = 0;
                glowGate = 'top';
                glowWires.add('top_out');
                setNarration('\u2777',
                    'Top NOR evaluates: R=1 \u2192 output <span class="hl">Q goes to 0</span>.');
            }, delay: animStepDelay },
            { run() {
                // Q=0 feeds back to bottom NOR
                wire.q_fb = 0;
                glowWires.add('q_fb');
                setNarration('\u2778',
                    'Q = 0 feeds back down to the bottom NOR gate\u2019s first input.');
            }, delay: animStepDelay },
            { run() {
                // Bottom NOR evaluates: Q_fb=0, S=0 → Qbar = NOR(0,0) = 1
                Qbar = 1; wire.bot_out = 1;
                glowGate = 'bottom';
                glowWires.add('bot_out');
                setNarration('\u2779',
                    'Bottom NOR: Q=0, S=0 \u2192 both inputs LOW \u2192 <span class="hl">Q\u0305 goes to 1!</span>');
            }, delay: animStepDelay },
            { run() {
                // Qbar=1 feeds back to top NOR, reinforcing
                wire.qbar_fb = 1;
                glowWires.add('qbar_fb');
                setNarration('\u277A',
                    'Q\u0305 = 1 feeds back up to the top NOR, <span class="hl-red">reinforcing</span> Q = 0.');
            }, delay: animStepDelay },
            { run() {
                setNarration('\u2714',
                    'Stable! The latch is <span class="hl-red">RESET: Q = 0</span>. Now click <span class="hl-red">RESET</span> again to release R and watch the <span class="hl">feedback hold</span>.');
            }, delay: animStepDelay },
        ];
    }

    function buildReleaseR() {
        // Currently: Q=0, Qbar=1, R=1 → release R=0
        return [
            { run() {
                R = 0; wire.r_in = 0;
                glowWires.add('r_in');
                setNarration('\u2776',
                    '<span class="hl-red">R is released (R = 0)</span> \u2014 can the latch hold its value?');
            }, delay: animStepDelay },
            { run() {
                // Top NOR re-evaluates: R=0, Qbar_fb=1 → NOR(0,1) = 0
                // Q stays 0!
                glowGate = 'top';
                glowWires.add('qbar_fb');
                setNarration('\u2777',
                    'Top NOR: R=0, but <span class="hl">Q\u0305 = 1 still feeds back</span> \u2192 NOR(0, 1) = 0. <span class="hl">Q stays 0!</span>');
            }, delay: animStepDelay * 1.3 },
            { run() {
                // Bottom NOR still stable
                glowGate = 'bottom';
                glowWires.add('q_fb');
                setNarration('\u2778',
                    'Bottom NOR: Q=0, S=0 \u2192 NOR(0, 0) = 1. <span class="hl">Q\u0305 stays 1!</span>');
            }, delay: animStepDelay * 1.3 },
            { run() {
                setNarration('\uD83D\uDCA1',
                    'The <span class="hl">feedback loop holds Q = 0</span> even though R is gone. <span class="hl-yellow">This is memory!</span> Click <span class="hl-green">SET</span> to store a 1.');
            }, delay: animStepDelay },
        ];
    }

    // ============================================
    // UI UPDATE
    // ============================================
    function updateUI() {
        const qBox = document.getElementById('out-q');
        const qbarBox = document.getElementById('out-qbar');
        qBox.querySelector('.value').textContent = Q;
        qbarBox.querySelector('.value').textContent = Qbar;
        qBox.className = 'output-box ' + (Q ? 'high' : 'low');
        qbarBox.className = 'output-box ' + (Qbar ? 'high' : 'low');

        const mem = document.getElementById('memory-state');
        if (Q === 1) {
            mem.className = 'memory-state storing-1';
            mem.textContent = 'Storing 1';
        } else {
            mem.className = 'memory-state storing-0';
            mem.textContent = 'Storing 0';
        }

        document.getElementById('btn-set').classList.toggle('active', S === 1);
        document.getElementById('btn-reset').classList.toggle('active', R === 1);
    }

    // ============================================
    // CIRCUIT DRAWING
    // ============================================
    const canvas = document.getElementById('circuit');
    const ctx = canvas.getContext('2d');

    const WIRE_HIGH = '#4fc3f7';
    const WIRE_LOW = '#3a4a5a';
    const GATE_FILL = '#1e2a3e';
    const GATE_STROKE = '#4a5a7a';
    const GLOW_COLOR = '#7fdbff';
    const GATE_GLOW = '#4fc3f7';

    function wireColor(val) { return val ? WIRE_HIGH : WIRE_LOW; }

    // Circuit layout constants
    const GX = 350;          // Gate X position
    const GW = 130;          // Gate width
    const BUBBLE_R = 11;     // NOR bubble radius
    const GH = 86;           // Gate height
    const TOP_GY = 220;      // Top gate center Y
    const BOT_GY = 480;      // Bottom gate center Y
    const INPUT_X = 70;      // Input label X
    const OUTPUT_X = 780;    // Output label X
    const GATE_OUT_X = GX + GW + BUBBLE_R * 2 + 5;  // Gate output X
    const JUNC_X = GATE_OUT_X + 110;   // Feedback junction X
    const FB_LEFT_Q = GX - 85;         // Q feedback left routing X
    const FB_LEFT_QB = GX - 55;        // Qbar feedback left routing X
    const INPUT_PIN_OFFSET = 26;       // Vertical offset of gate input pins from center

    function drawWire(points, val, isGlowing, dashed) {
        ctx.strokeStyle = wireColor(val);
        ctx.lineWidth = isGlowing ? 6 : 4;
        if (dashed) ctx.setLineDash([8, 6]);
        else ctx.setLineDash([]);

        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i][0], points[i][1]);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        // Glow effect
        if (isGlowing) {
            ctx.save();
            ctx.strokeStyle = GLOW_COLOR;
            ctx.lineWidth = 10;
            ctx.globalAlpha = 0.25;
            if (dashed) ctx.setLineDash([8, 6]);
            ctx.beginPath();
            ctx.moveTo(points[0][0], points[0][1]);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i][0], points[i][1]);
            }
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }
    }

    function drawNorGate(x, y, isGlowing) {
        ctx.save();
        ctx.translate(x, y);

        const w = GW, h = GH;

        // Glow behind gate
        if (isGlowing) {
            ctx.shadowColor = GATE_GLOW;
            ctx.shadowBlur = 30;
        }

        // Gate body
        ctx.fillStyle = isGlowing ? '#243552' : GATE_FILL;
        ctx.strokeStyle = isGlowing ? GATE_GLOW : GATE_STROKE;
        ctx.lineWidth = isGlowing ? 4 : 3;
        ctx.beginPath();
        ctx.moveTo(0, -h / 2);
        ctx.quadraticCurveTo(22, 0, 0, h / 2);
        ctx.quadraticCurveTo(65, h / 2, w, 0);
        ctx.quadraticCurveTo(65, -h / 2, 0, -h / 2);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Bubble
        ctx.beginPath();
        ctx.arc(w + BUBBLE_R, 0, BUBBLE_R, 0, Math.PI * 2);
        ctx.fillStyle = isGlowing ? '#243552' : GATE_FILL;
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur = 0;

        // Label
        ctx.fillStyle = isGlowing ? '#b0d4f1' : '#8899aa';
        ctx.font = '20px Segoe UI';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('NOR', 58, 0);

        ctx.restore();
    }

    function drawDot(x, y, val, isGlowing) {
        ctx.beginPath();
        ctx.arc(x, y, isGlowing ? 8 : 6, 0, Math.PI * 2);
        ctx.fillStyle = wireColor(val);
        ctx.fill();
        if (isGlowing) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, 14, 0, Math.PI * 2);
            ctx.fillStyle = GLOW_COLOR;
            ctx.globalAlpha = 0.25;
            ctx.fill();
            ctx.restore();
        }
    }

    function drawCircuit() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const topIn1Y = TOP_GY - INPUT_PIN_OFFSET;  // R input pin
        const topIn2Y = TOP_GY + INPUT_PIN_OFFSET;  // Qbar feedback pin
        const botIn1Y = BOT_GY - INPUT_PIN_OFFSET;  // Q feedback pin
        const botIn2Y = BOT_GY + INPUT_PIN_OFFSET;  // S input pin

        // --- Feedback wires (behind gates) ---

        // Q feedback: junction → down → across → up → bottom gate input 1
        drawWire([
            [JUNC_X, TOP_GY],
            [JUNC_X, TOP_GY + 65],
            [FB_LEFT_Q, BOT_GY - 65],
            [FB_LEFT_Q, botIn1Y],
            [GX + 14, botIn1Y]
        ], wire.q_fb, glowWires.has('q_fb'), true);

        // Qbar feedback: junction → up → across → down → top gate input 2
        drawWire([
            [JUNC_X, BOT_GY],
            [JUNC_X, BOT_GY - 65],
            [FB_LEFT_QB, TOP_GY + 65],
            [FB_LEFT_QB, topIn2Y],
            [GX + 14, topIn2Y]
        ], wire.qbar_fb, glowWires.has('qbar_fb'), true);

        // --- Input wires ---
        // R input → top gate input 1
        drawWire([
            [INPUT_X + 50, topIn1Y],
            [GX + 14, topIn1Y]
        ], wire.r_in, glowWires.has('r_in'), false);

        // S input → bottom gate input 2
        drawWire([
            [INPUT_X + 50, botIn2Y],
            [GX + 14, botIn2Y]
        ], wire.s_in, glowWires.has('s_in'), false);

        // --- Gate output wires ---
        // Top gate output → junction → Q label
        drawWire([
            [GATE_OUT_X, TOP_GY],
            [JUNC_X, TOP_GY]
        ], wire.top_out, glowWires.has('top_out'), false);

        drawWire([
            [JUNC_X, TOP_GY],
            [OUTPUT_X - 16, TOP_GY]
        ], wire.top_out, glowWires.has('top_out'), false);

        // Bottom gate output → junction → Qbar label
        drawWire([
            [GATE_OUT_X, BOT_GY],
            [JUNC_X, BOT_GY]
        ], wire.bot_out, glowWires.has('bot_out'), false);

        drawWire([
            [JUNC_X, BOT_GY],
            [OUTPUT_X - 16, BOT_GY]
        ], wire.bot_out, glowWires.has('bot_out'), false);

        // --- Draw gates ---
        drawNorGate(GX, TOP_GY, glowGate === 'top');
        drawNorGate(GX, BOT_GY, glowGate === 'bottom');

        // --- Junction dots ---
        drawDot(JUNC_X, TOP_GY, wire.top_out, glowWires.has('top_out') || glowWires.has('q_fb'));
        drawDot(JUNC_X, BOT_GY, wire.bot_out, glowWires.has('bot_out') || glowWires.has('qbar_fb'));

        // --- Input labels ---
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // R label
        ctx.font = 'bold 34px SF Mono, Fira Code, monospace';
        ctx.fillStyle = wire.r_in ? '#ef5350' : '#5a6a7a';
        ctx.fillText('R', INPUT_X, topIn1Y);
        ctx.font = '22px SF Mono, monospace';
        ctx.fillText(wire.r_in ? '= 1' : '= 0', INPUT_X, topIn1Y + 32);

        // S label
        ctx.font = 'bold 34px SF Mono, Fira Code, monospace';
        ctx.fillStyle = wire.s_in ? '#66bb6a' : '#5a6a7a';
        ctx.fillText('S', INPUT_X, botIn2Y);
        ctx.font = '22px SF Mono, monospace';
        ctx.fillText(wire.s_in ? '= 1' : '= 0', INPUT_X, botIn2Y + 32);

        // --- Output labels ---
        ctx.textAlign = 'left';

        // Q label
        ctx.font = 'bold 34px SF Mono, Fira Code, monospace';
        ctx.fillStyle = wire.top_out ? WIRE_HIGH : '#5a6a7a';
        ctx.fillText('Q', OUTPUT_X, TOP_GY);
        ctx.font = '22px SF Mono, monospace';
        ctx.fillText('= ' + Q, OUTPUT_X, TOP_GY + 32);

        // Qbar label
        ctx.font = 'bold 34px SF Mono, Fira Code, monospace';
        ctx.fillStyle = wire.bot_out ? WIRE_HIGH : '#5a6a7a';
        ctx.fillText('Q\u0305', OUTPUT_X, BOT_GY);
        ctx.font = '22px SF Mono, monospace';
        ctx.fillText('= ' + Qbar, OUTPUT_X, BOT_GY + 32);

        // --- Gate role labels ---
        ctx.textAlign = 'center';
        ctx.font = '16px Segoe UI';
        ctx.fillStyle = '#556677';
        ctx.fillText('(produces Q)', GX + 70, TOP_GY - GH / 2 - 18);
        ctx.fillText('(produces Q\u0305)', GX + 70, BOT_GY - GH / 2 - 18);

        // --- Feedback labels ---
        ctx.font = 'italic 15px Segoe UI';
        ctx.fillStyle = '#556677';
        ctx.textAlign = 'left';

        // Q feedback label
        const qfbMidY = (TOP_GY + 65 + BOT_GY - 65) / 2;
        ctx.save();
        ctx.translate(FB_LEFT_Q - 16, qfbMidY);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.fillText('Q feedback', 0, 0);
        ctx.restore();

        // Qbar feedback label
        const qbfbMidY = (BOT_GY - 65 + TOP_GY + 65) / 2;
        ctx.save();
        ctx.translate(FB_LEFT_QB - 16, qbfbMidY);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.fillText('Q\u0305 feedback', 0, 0);
        ctx.restore();
    }

    // ============================================
    // INPUT HANDLERS
    // ============================================

    document.getElementById('btn-set').addEventListener('click', () => {
        if (animating) return;

        if (S === 0) {
            // Assert S
            if (Q === 1) {
                // Already set — tell user
                setNarration('\u26A0',
                    'Q is already 1. Click <span class="hl-red">RESET</span> first, then SET again to see the propagation.');
                return;
            }
            queueSteps(buildAssertS());
        } else {
            // Release S
            queueSteps(buildReleaseS());
        }
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        if (animating) return;

        if (R === 0) {
            // Assert R
            if (Q === 0) {
                setNarration('\u26A0',
                    'Q is already 0. Click <span class="hl-green">SET</span> first, then RESET to see the propagation.');
                return;
            }
            queueSteps(buildAssertR());
        } else {
            // Release R
            queueSteps(buildReleaseR());
        }
    });

    // Speed buttons
    document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            animStepDelay = parseInt(btn.dataset.speed);
        });
    });

    // ============================================
    // INITIALIZE
    // ============================================
    autoResize();
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(autoResize, 50);
    });
    window.addEventListener('orientationchange', () => setTimeout(autoResize, 100));

    updateUI();
    drawCircuit();
</script>
</body>
</html>
