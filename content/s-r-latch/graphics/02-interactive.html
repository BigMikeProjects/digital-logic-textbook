<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR & S'-R' Latch — The Feedback That Remembers</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    body { display: flex; align-items: center; justify-content: center; }
    .viewport-container { width: 100%; max-width: 100vw; aspect-ratio: 16/9;
        max-height: 100vh; position: relative; overflow: hidden; }
    .design-surface { width: 1920px; height: 1080px; position: absolute; top: 0; left: 0;
        transform-origin: top left; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #e0e0e0; padding: 26px 52px; display: flex; flex-direction: column; }

    /* tokens: cyan #4fc3f7 = 1/active · amber #ffb74d = S/R controls · violet #b388ff = forbidden · navy #0d1b2a panel */
    @keyframes dash { to { stroke-dashoffset: -48; } }
    .flow { stroke-dasharray: 13 9; animation: dash 1s linear infinite; }

    .topbar { display: flex; align-items: center; gap: 28px; }
    .anchor-sym { flex-shrink: 0; border: 2px solid #ffb74d; border-radius: 12px;
        background: rgba(255,183,77,0.06); padding: 8px 16px; }
    .anchor-sym svg { width: 168px; height: 84px; display: block; color: #4fc3f7; }
    .titles { flex: 1; }
    .titles h1 { color: #4fc3f7; font-size: 34px; font-weight: 700; }
    .titles h1 .sub { color: #90a4ae; font-size: 21px; font-weight: 500; }
    .titles .subtitle { color: #90a4ae; font-size: 17px; margin-top: 2px; }
    .page-count { flex-shrink: 0; color: #607d8b; font-size: 20px; font-weight: 600;
        border: 2px solid #37506a; border-radius: 10px; padding: 8px 18px; }
    .page-count b { color: #4fc3f7; font-size: 26px; }

    .tabstrip { display: flex; gap: 14px; margin: 16px 0 4px; }
    .tab { flex: 1; display: flex; align-items: center; gap: 12px; border: 2px solid #24384c;
        border-radius: 12px; padding: 12px 22px; color: #6a8398; transition: all .12s ease; }
    .tab .tnum { width: 38px; height: 38px; flex-shrink: 0; border: 2px solid currentColor;
        border-radius: 9px; display: flex; align-items: center; justify-content: center;
        font-size: 20px; font-weight: 700; }
    .tab .tlabel { font-size: 21px; font-weight: 700; }
    .tab.on { color: #4fc3f7; border-color: #4fc3f7; background: rgba(79,195,247,0.08); }
    .tab.on .tnum { background: #4fc3f7; color: #0d1b2a; border-color: #4fc3f7; }

    .stage { flex: 1; position: relative; min-height: 0; margin-top: 14px; }
    .page { position: absolute; inset: 0; display: none; }
    .page.active { display: flex; }

    .latch { display: flex; gap: 34px; width: 100%; align-items: stretch; }
    .schwrap { flex: 0 0 56%; display: flex; align-items: center; justify-content: center;
        background: #0d1b2a; border: 2px solid #24384c; border-radius: 18px; padding: 12px; }
    .schwrap svg { width: 100%; height: 100%; max-height: 640px; }
    .panel { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 0; }

    .ctls { display: flex; gap: 18px; }
    .selctl { flex: 1; display: flex; align-items: center; justify-content: center; gap: 14px; cursor: pointer;
        border: 2px solid #ffb74d; border-radius: 999px; padding: 14px 22px;
        background: rgba(255,183,77,0.08); user-select: none; }
    .selctl .sc-label { color: #ffb74d; font-size: 26px; font-weight: 700; font-family: 'Consolas','Courier New',monospace; }
    .selctl .sc-val { color: #e0e0e0; font-size: 24px; font-family: 'Consolas','Courier New',monospace; }
    .selctl .sc-val b { font-size: 30px; }
    .selctl .sc-val b.one { color: #4fc3f7; } .selctl .sc-val b.zero { color: #5c7189; }
    .selctl .sc-hint { color: #8a7a52; font-size: 14px; }

    .statebadge { align-self: flex-start; font-size: 27px; font-weight: 700; letter-spacing: 1px;
        border-radius: 12px; padding: 10px 26px; border: 2px solid; }
    .statebadge.hold { color: #4fc3f7; border-color: #4fc3f7; background: rgba(79,195,247,0.10); }
    .statebadge.set, .statebadge.reset { color: #cfd8dc; border-color: #37506a; background: #0d1b2a; }
    .statebadge.forbidden { color: #b388ff; border-color: #6a4fa0; background: rgba(179,136,255,0.12); }

    .qout { font-size: 34px; font-family: 'Consolas','Courier New',monospace; color: #90a4ae; }
    .qout b { font-size: 40px; } .qout b.one { color: #4fc3f7; } .qout b.zero { color: #5c7189; }

    .tt { border-collapse: collapse; font-size: 22px; font-family: 'Consolas','Courier New',monospace; align-self: flex-start; }
    .tt th, .tt td { border: 2px solid #37506a; padding: 7px 20px; text-align: center; color: #e0e0e0; }
    .tt th { background: rgba(79,195,247,0.12); color: #4fc3f7; font-weight: 700; font-size: 19px; }
    .tt td.one { color: #4fc3f7; } .tt td.zero { color: #5c7189; }
    .tt td.mode { color: #90a4ae; font-family: 'Segoe UI',sans-serif; font-size: 19px; }
    .tt tr.rowon td { background: rgba(79,195,247,0.20); color: #fff; }
    .tt tr.rowon td.mode { color: #cfe6f5; }
    .tt tr.forb.rowon td { background: rgba(179,136,255,0.18); }

    .caption { font-size: 22px; color: #cfd8dc; line-height: 1.5; border-left: 3px solid #4fc3f7;
        padding-left: 18px; margin-top: auto; }
    .caption .cy { color: #4fc3f7; font-weight: 600; } .caption .am { color: #ffb74d; font-weight: 600; }
    .caption .vl { color: #b388ff; font-weight: 600; }

    .footer { display: flex; align-items: center; justify-content: center; gap: 24px; margin-top: 12px; height: 34px; }
    .progress { display: flex; gap: 9px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #4a6274; }
    .dot.on { background: #4fc3f7; border-color: #4fc3f7; }
    .controls { color: #607d8b; font-size: 16px; }
    .controls .k { display: inline-block; color: #90a4ae; border: 1px solid #37506a; border-radius: 6px;
        padding: 1px 8px; margin: 0 2px; font-size: 14px; font-family: 'Consolas','Courier New',monospace; }
    .controls .k.amber { color: #ffb74d; border-color: #6a5324; }
</style>
</head>
<body>
<div class="viewport-container" id="viewportContainer">
<div class="design-surface" id="designSurface">

    <div class="topbar">
        <div class="anchor-sym">
            <svg viewBox="0 0 168 84" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <rect x="54" y="14" width="60" height="56" rx="6"/>
                <line x1="28" y1="28" x2="54" y2="28"/><line x1="28" y1="56" x2="54" y2="56"/>
                <line x1="114" y1="28" x2="142" y2="28"/><line x1="114" y1="56" x2="142" y2="56"/>
                <text x="24" y="33" font-size="13" fill="#ffb74d" stroke="none" text-anchor="end" font-family="Consolas,monospace">S</text>
                <text x="24" y="61" font-size="13" fill="#ffb74d" stroke="none" text-anchor="end" font-family="Consolas,monospace">R</text>
                <text x="148" y="33" font-size="13" fill="#4fc3f7" stroke="none" font-family="Consolas,monospace">Q</text>
                <text x="148" y="61" font-size="12" fill="#607d8b" stroke="none" font-family="Consolas,monospace">Q&#8242;</text>
                <path d="M70,40 h28 M84,40 v14 h-14" stroke="#4fc3f7"/>
            </svg>
        </div>
        <div class="titles">
            <h1>The Latch <span class="sub">&mdash; the feedback that remembers</span></h1>
            <div class="subtitle">Two cross-coupled gates store one bit &middot; toggle the inputs and watch the loop hold it</div>
        </div>
        <div class="page-count">Page <b id="pcNum">1</b> / 2</div>
    </div>

    <div class="tabstrip" id="tabstrip">
        <div class="tab" data-page="1"><div class="tnum">1</div><div class="tlabel">S-R Latch (NOR)</div></div>
        <div class="tab" data-page="2"><div class="tnum">2</div><div class="tlabel">S&#8242;-R&#8242; Latch (NAND)</div></div>
    </div>

    <div class="stage">
        <div class="page" id="p1">
            <div class="latch">
                <div class="schwrap"><svg id="sch1" viewBox="110 78 640 362"></svg></div>
                <div class="panel" id="panel1"></div>
            </div>
        </div>
        <div class="page" id="p2">
            <div class="latch">
                <div class="schwrap"><svg id="sch2" viewBox="110 78 640 362"></svg></div>
                <div class="panel" id="panel2"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="progress">
            <div class="dot" data-dot="1"></div><div class="dot" data-dot="2"></div>
        </div>
        <div class="controls">
            <span class="k">1</span>&ndash;<span class="k">2</span> latch
            &middot; <span class="k amber">S</span> / <span class="k amber">R</span> toggle inputs (or click)
            &middot; try: set Q=1, then release to hold &mdash; it stays
        </div>
    </div>

</div>
</div>

<script>
    const DESIGN_WIDTH = 1920, DESIGN_HEIGHT = 1080;
    function autoResize() {
        const c = document.getElementById('viewportContainer');
        const s = document.getElementById('designSurface');
        const vw = window.innerWidth, vh = window.innerHeight;
        let cw, ch;
        if (vw / vh > 16/9) { ch = vh; cw = ch*(16/9); } else { cw = vw; ch = cw*(9/16); }
        c.style.width = cw+'px'; c.style.height = ch+'px';
        s.style.transform = `scale(${cw/DESIGN_WIDTH})`;
    }
    autoResize();
    let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(autoResize,50); });
    window.addEventListener('orientationchange', () => setTimeout(autoResize,100));

    const SVGNS = 'http://www.w3.org/2000/svg';
    const DIM = '#45607a', BRIGHT = '#4fc3f7';

    /* ---------- latch logic (verified headless) ---------- */
    function norLatch(S,R,q){ if(S&&R) return {Q:0,Qb:0,mode:'FORBIDDEN'};
        const Q=(S&&!R)?1:(R&&!S)?0:q; return {Q,Qb:1-Q,mode:(S&&!R)?'SET':(R&&!S)?'RESET':'HOLD'}; }
    function nandLatch(Sb,Rb,q){ if(!Sb&&!Rb) return {Q:1,Qb:1,mode:'FORBIDDEN'};
        const Q=(!Sb&&Rb)?1:(!Rb&&Sb)?0:q; return {Q,Qb:1-Q,mode:(!Sb&&Rb)?'SET':(!Rb&&Sb)?'RESET':'HOLD'}; }

    /* ---------- schematic builder ---------- */
    function el(par,tag,a){ const e=document.createElementNS(SVGNS,tag); for(const k in a) e.setAttribute(k,a[k]); par.appendChild(e); return e; }
    function wire(par,pts){ return el(par,'polyline',{points:pts,fill:'none',stroke:DIM,'stroke-width':3,'stroke-linecap':'round','stroke-linejoin':'round'}); }
    function txt(par,x,y,s,fill,size,anchor){ const t=el(par,'text',{x,y,fill,'font-size':size||20,'font-family':'Consolas,monospace','text-anchor':anchor||'start'}); t.textContent=s; return t; }

    // NOR/NAND gate body; back-left at bx, centre cy, width w, height h; returns output pin x
    function gateBody(par,type,bx,cy,w,h){
        const t=cy-h/2, b=cy+h/2;
        if(type==='NOR'){
            el(par,'path',{d:`M${bx},${t} C${bx+w*0.46},${t} ${bx+w*0.80},${cy-h*0.32} ${bx+w},${cy} `+
                `C${bx+w*0.80},${cy+h*0.32} ${bx+w*0.46},${b} ${bx},${b} Q${bx+w*0.26},${cy} ${bx},${t} Z`,
                fill:'none',stroke:'#cfd8dc','stroke-width':2.8});
        } else {
            el(par,'path',{d:`M${bx},${t} L${bx+w-h/2},${t} A${h/2},${h/2} 0 0 1 ${bx+w-h/2},${b} L${bx},${b} Z`,
                fill:'none',stroke:'#cfd8dc','stroke-width':2.8});
        }
        el(par,'circle',{cx:bx+w+7,cy:cy,r:7,fill:'none',stroke:'#cfd8dc','stroke-width':2.8}); // inversion bubble
        return bx+w+14;
    }

    // Build one latch schematic; returns handles for live updating
    function buildLatch(svg, type, topLbl, botLbl){
        svg.innerHTML='';
        const bx=290, w=120, h=88, cyA=150, cyB=370;
        // gate bodies
        const outA = gateBody(svg,type,bx,cyA,w,h);   // Q gate (top)
        const outB = gateBody(svg,type,bx,cyB,w,h);   // Q' gate (bottom)
        txt(svg, bx+52, cyA+7, type, '#5c7189', 17, 'middle');
        txt(svg, bx+52, cyB+7, type, '#5c7189', 17, 'middle');
        // wires (kept for recolouring)
        const wTop  = wire(svg, `150,${cyA-21} ${bx},${cyA-21}`);                       // ext -> gate A top
        const wBot  = wire(svg, `150,${cyB+21} ${bx},${cyB+21}`);                       // ext -> gate B bottom
        const wQ    = wire(svg, `${outA},${cyA} 620,${cyA}`);                            // gate A out = Q
        const wQbar = wire(svg, `${outB},${cyB} 620,${cyB}`);                            // gate B out = Q'
        // feedback: Q -> gate B top input ; Q' -> gate A bottom input (routed through the gap)
        const wFbQ    = wire(svg, `480,${cyA} 480,260 245,260 245,${cyB-21} ${bx},${cyB-21}`);
        const wFbQbar = wire(svg, `510,${cyB} 510,300 225,300 225,${cyA+21} ${bx},${cyA+21}`);
        el(svg,'circle',{cx:480,cy:cyA,r:5,fill:BRIGHT,stroke:'none'});   // feedback taps
        el(svg,'circle',{cx:510,cy:cyB,r:5,fill:DIM,stroke:'none'});
        // static input labels
        txt(svg, 138, cyA-15, topLbl, '#ffb74d', 24, 'end');
        txt(svg, 138, cyB+29, botLbl, '#ffb74d', 24, 'end');
        // output labels + live value
        const qText  = txt(svg, 632, cyA+8, 'Q = 0', BRIGHT, 24, 'start');
        const qbText = txt(svg, 632, cyB+8, "Q' = 0", '#90a4ae', 22, 'start');
        return {wTop,wBot,wQ,wQbar,wFbQ,wFbQbar,qText,qbText};
    }

    /* ---------- pages ---------- */
    const pages = [
        { id:1, sch:'sch1', panel:'panel1', gate:'NOR', title:'S-R Latch', topLbl:'R', botLbl:'S',
          ctl:[{lab:'S',val:0},{lab:'R',val:0}], q:0,
          compute(){ const o=norLatch(this.ctl[0].val,this.ctl[1].val,this.q); this.q=o.Q; return o; },
          wireVals(o){ return {top:this.ctl[1].val, bot:this.ctl[0].val, Q:o.Q, Qb:o.Qb}; },  // gateA-top=R, gateB-bot=S
          tt:[['0','0','hold'],['1','0','set'],['0','1','reset'],['1','1','forbidden']] },
        { id:2, sch:'sch2', panel:'panel2', gate:'NAND', title:"S'-R' Latch", topLbl:"S'", botLbl:"R'",
          ctl:[{lab:"S'",val:1},{lab:"R'",val:1}], q:0,
          compute(){ const o=nandLatch(this.ctl[0].val,this.ctl[1].val,this.q); this.q=o.Q; return o; },
          wireVals(o){ return {top:this.ctl[0].val, bot:this.ctl[1].val, Q:o.Q, Qb:o.Qb}; },   // gateA-top=S', gateB-bot=R'
          tt:[['1','1','hold'],['0','1','set'],['1','0','reset'],['0','0','forbidden']] },
    ];

    // build panels + schematics
    pages.forEach(pg=>{
        pg.h = buildLatch(document.getElementById(pg.sch), pg.gate, pg.topLbl, pg.botLbl);
        const panel = document.getElementById(pg.panel);
        const ctlHtml = pg.ctl.map((c,i)=>`<div class="selctl" data-ctl="${i}"><span class="sc-label">${c.lab}</span><span class="sc-val">= <b>0</b></span><span class="sc-hint">click / key</span></div>`).join('');
        const rows = pg.tt.map(r=>`<tr class="ttrow ${r[2]==='forbidden'?'forb':''}" data-a="${r[0]}" data-b="${r[1]}"><td>${r[0]}</td><td>${r[1]}</td><td class="mode">${r[2]}</td></tr>`).join('');
        panel.innerHTML =
            `<div class="ctls">${ctlHtml}</div>`+
            `<div class="statebadge hold">HOLD</div>`+
            `<div class="qout">Q = <b>0</b> &nbsp;&middot;&nbsp; Q&#8242; = <b>0</b></div>`+
            `<table class="tt"><tr><th>${pg.ctl[0].lab}</th><th>${pg.ctl[1].lab}</th><th>mode</th></tr>${rows}</table>`+
            `<div class="caption"></div>`;
        panel.querySelectorAll('[data-ctl]').forEach(elm=> elm.addEventListener('click', ()=>{ toggle(pg, +elm.dataset.ctl); }));
    });

    function setWire(w, v, animate){ w.setAttribute('stroke', v? BRIGHT : DIM); w.classList.toggle('flow', !!animate); }

    function renderPage(pg){
        const o = pg.compute();
        const wv = pg.wireVals(o);
        const holding = o.mode==='HOLD';
        // schematic wires (feedback loop animates while holding)
        setWire(pg.h.wTop, wv.top, false);
        setWire(pg.h.wBot, wv.bot, false);
        setWire(pg.h.wQ,    wv.Q,  holding && wv.Q===1 || (holding));
        setWire(pg.h.wQbar, wv.Qb, holding);
        setWire(pg.h.wFbQ,   wv.Q,  holding);
        setWire(pg.h.wFbQbar,wv.Qb, holding);
        pg.h.qText.textContent = 'Q = '+o.Q;   pg.h.qText.setAttribute('fill', o.Q? BRIGHT : '#5c7189');
        pg.h.qbText.textContent = "Q' = "+o.Qb; pg.h.qbText.setAttribute('fill', o.Qb? BRIGHT : '#5c7189');
        // panel
        const panel = document.getElementById(pg.panel);
        pg.ctl.forEach((c,i)=>{ const b=panel.querySelectorAll('.selctl .sc-val b')[i];
            b.textContent=c.val; b.className=c.val? 'one':'zero'; });
        const badge = panel.querySelector('.statebadge');
        badge.textContent = o.mode; badge.className = 'statebadge '+o.mode.toLowerCase();
        const qb = panel.querySelectorAll('.qout b');
        qb[0].textContent=o.Q; qb[0].className=o.Q?'one':'zero';
        qb[1].textContent=o.Qb; qb[1].className=o.Qb?'one':'zero';
        panel.querySelectorAll('.ttrow').forEach(r=>{
            r.classList.toggle('rowon', r.dataset.a==String(pg.ctl[0].val) && r.dataset.b==String(pg.ctl[1].val));
            r.querySelectorAll('td')[0].className = +r.dataset.a? 'one':'zero';
            r.querySelectorAll('td')[1].className = +r.dataset.b? 'one':'zero';
            r.querySelectorAll('td')[2].className = 'mode';
        });
        // caption
        const cap = panel.querySelector('.caption');
        const capText = {
            HOLD: `<span class="cy">Hold.</span> Inputs idle &mdash; each gate's output is set only by the <span class="am">other gate fed back</span>. Q=${o.Q} feeds across to force Q&#8242;=${o.Qb}, which feeds back to keep Q=${o.Q}. The bit lives in the <span class="cy">loop</span>, not any one gate.`,
            SET:   `<span class="am">Set.</span> The active input forces <span class="cy">Q=1</span>. Release both inputs to idle and the feedback loop will <span class="cy">remember</span> it.`,
            RESET: `<span class="am">Reset.</span> The active input forces <span class="cy">Q=0</span>. Release to idle and the loop holds it.`,
            FORBIDDEN: `<span class="vl">Forbidden.</span> Both inputs asserted drive Q and Q&#8242; to the <span class="vl">same value</span> &mdash; they are no longer complementary, and on release the latch races to an unpredictable state.`,
        };
        cap.innerHTML = capText[o.mode];
    }

    /* ---------- paging + input ---------- */
    let page = 1;
    const tabs = Array.from(document.querySelectorAll('.tab'));
    const dots = Array.from(document.querySelectorAll('.dot'));
    const pcNum = document.getElementById('pcNum');
    const pgObj = n => pages[n-1];

    function showPage(n){
        page = Math.max(1, Math.min(2, n));
        document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active', p.id==='p'+page));
        tabs.forEach(t=>t.classList.toggle('on', +t.dataset.page===page));
        dots.forEach(d=>d.classList.toggle('on', +d.dataset.dot===page));
        pcNum.textContent = page;
        renderPage(pgObj(page));
    }
    function toggle(pg, i){ pg.ctl[i].val = pg.ctl[i].val ? 0 : 1; renderPage(pg); }

    document.addEventListener('keydown',(e)=>{
        const k=e.key;
        if(k==='1'||k==='2'){ showPage(+k); e.preventDefault(); return; }
        const pg = pgObj(page);
        if(k==='s'||k==='S'){ toggle(pg,0); e.preventDefault(); }
        else if(k==='r'||k==='R'){ toggle(pg,1); e.preventDefault(); }
    });
    tabs.forEach(t=>t.addEventListener('click', ()=>showPage(+t.dataset.page)));

    // init: render both, show page 1
    pages.forEach(renderPage);
    showPage(1);
</script>
</body>
</html>
