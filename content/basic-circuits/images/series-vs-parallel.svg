<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 570" width="940" height="570">

  <style>
    svg { background: #fff; }
    .wire { fill: none; stroke: #24313f; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .thin { fill: none; stroke: #24313f; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .dash { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 8 8; }
    .current { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
    .voltage { fill: none; stroke: #f97316; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-orange); }
    .path { fill: none; stroke: #16a34a; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; opacity: .28; }
    .break { fill: none; stroke: #dc2626; stroke-width: 4; stroke-linecap: round; }
    .label { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 23px; fill: #24313f; }
    .small { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 18px; fill: #64748b; }
    .tiny { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 15px; fill: #64748b; }
    .title { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #24313f; }
    .eq { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 42px; font-weight: 700; fill: #24313f; }
    .node { fill: #fff; stroke: #24313f; stroke-width: 3; }
    .box { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 2; rx: 8; }
    .soft-blue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 2; rx: 8; }
    .soft-orange { fill: #fff7ed; stroke: #fed7aa; stroke-width: 2; rx: 8; }
    .soft-green { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 2; rx: 8; }
    .soft-red { fill: #fef2f2; stroke: #fecaca; stroke-width: 2; rx: 8; }
    .glow-dim { fill: #facc15; opacity: .18; }
    .glow-med { fill: #facc15; opacity: .34; }
    .glow-bright { fill: #facc15; opacity: .55; }
  </style>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#24313f"/>
    </marker>
  </defs>

<text class="title" x="54" y="56">Series vs. Parallel</text>
    <rect class="soft-blue" x="56" y="92" width="390" height="418"/>
    <text class="title" x="86" y="138">Series</text>
    <line class="wire" x1="100" y1="250" x2="154" y2="250"/><polyline class="wire" points="154.0,250.0 167.2,250.0 173.9,232.0 187.1,268.0 200.4,232.0 213.6,268.0 226.9,232.0 240.1,268.0 246.8,250.0 260.0,250.0"/><text class="small" x="189.0" y="219">R1</text><line class="wire" x1="260" y1="250" x2="310" y2="250"/><polyline class="wire" points="310.0,250.0 323.2,250.0 329.9,232.0 343.1,268.0 356.4,232.0 369.6,268.0 382.9,232.0 396.1,268.0 402.8,250.0 416.0,250.0"/><text class="small" x="345.0" y="219">R2</text>
    <path class="current" d="M 120 198 L 370 198"/><text class="small" x="188" y="184">shared current</text>
    <text class="small" x="154" y="308" style="fill: #f97316">+</text><text class="small" x="246" y="308" style="fill: #f97316">-</text>
    <text class="small" x="310" y="308" style="fill: #f97316">+</text><text class="small" x="402" y="308" style="fill: #f97316">-</text>
    <text class="label" x="100" y="360">One path</text>
    <text class="small" x="100" y="400">Voltage divides across components.</text>
    
    <rect class="soft-orange" x="494" y="92" width="390" height="418"/>
    <text class="title" x="524" y="138">Parallel</text>
    <line class="wire" x1="545" y1="250" x2="610" y2="250"/><line class="wire" x1="610" y1="190" x2="610" y2="310"/><line class="wire" x1="800" y1="190" x2="800" y2="310"/><line class="wire" x1="800" y1="250" x2="850" y2="250"/>
    <polyline class="wire" points="610.0,190.0 633.8,190.0 645.6,172.0 669.4,208.0 693.1,172.0 716.9,208.0 740.6,172.0 764.4,208.0 776.2,190.0 800.0,190.0"/><text class="small" x="687.0" y="159">R1</text><polyline class="wire" points="610.0,310.0 633.8,310.0 645.6,292.0 669.4,328.0 693.1,292.0 716.9,328.0 740.6,292.0 764.4,328.0 776.2,310.0 800.0,310.0"/><text class="small" x="687.0" y="279">R2</text>
    <text class="small" x="582" y="170" style="fill: #f97316">+</text><text class="small" x="812" y="170" style="fill: #f97316">-</text>
    <text class="small" x="582" y="352" style="fill: #f97316">+</text><text class="small" x="812" y="352" style="fill: #f97316">-</text>
    <text class="small" x="668" y="166">shared voltage</text>
    <text class="label" x="545" y="392">Multiple paths</text>
    <text class="small" x="545" y="432">Current divides among branches.</text>
    
</svg>
